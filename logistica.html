<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logística: Gestión Total - ECA</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 p-4">
    <div class="max-w-4xl mx-auto">
        <div class="flex justify-between items-center mb-6">
            <h1 class="text-2xl font-bold text-orange-600 underline">Gestión de Cargas y Unidades</h1>
            <button onclick="cerrarSesion()" class="text-xs bg-gray-500 text-white px-2 py-1 rounded hover:bg-gray-700">Cerrar Sesión</button>
        </div>

        <div class="bg-white p-4 rounded shadow mb-8 border-t-4 border-orange-500">
            <h2 class="font-bold mb-4 text-gray-700">Programar Nuevo Viaje</h2>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-2">
                <input id="patente" type="text" placeholder="Patente" class="border p-2 rounded uppercase focus:ring-2 focus:ring-orange-500 outline-none">
                <input id="chofer" type="text" placeholder="Nombre Chofer" class="border p-2 rounded focus:ring-2 focus:ring-orange-500 outline-none">
                <button onclick="crearViaje()" class="bg-orange-500 text-white p-2 rounded font-bold hover:bg-orange-600 transition">
                    Registrar Viaje
                </button>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            
            <div class="bg-white p-4 rounded shadow">
                <h2 class="font-bold mb-4 text-gray-700 flex items-center">
                    <span class="w-3 h-3 bg-orange-500 rounded-full mr-2"></span> Por Autorizar
                </h2>
                <div id="lista-pendientes" class="space-y-3"></div>
            </div>

            <div class="bg-white p-4 rounded shadow">
                <h2 class="font-bold mb-4 text-gray-700 flex items-center">
                    <span class="w-3 h-3 bg-green-500 rounded-full mr-2"></span> En Planta / Habilitados
                </h2>
                <div id="lista-gestion" class="space-y-3 text-sm"></div>
            </div>
        </div>
    </div>

    <div id="modal-editar" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center p-4">
        <div class="bg-white p-6 rounded-lg shadow-xl w-full max-w-sm">
            <h3 class="font-bold text-lg mb-4">Editar Datos del Viaje</h3>
            <input id="edit-id" type="hidden">
            <div class="space-y-3">
                <input id="edit-patente" type="text" class="w-full border p-2 rounded uppercase" placeholder="Patente">
                <input id="edit-chofer" type="text" class="w-full border p-2 rounded" placeholder="Chofer">
                <div class="flex gap-2 pt-2">
                    <button onclick="guardarEdicion()" class="flex-1 bg-blue-600 text-white p-2 rounded font-bold">Guardar</button>
                    <button onclick="cerrarModal()" class="flex-1 bg-gray-200 p-2 rounded">Cancelar</button>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, where, updateDoc, doc, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD59XE1FYbUPqiUjn7vBMT89PcGjB2Svzs",
            authDomain: "ingresocamiones.firebaseapp.com",
            projectId: "ingresocamiones",
            storageBucket: "ingresocamiones.firebasestorage.app",
            messagingSenderId: "170806305489",
            appId: "1:170806305489:web:0264fc24aec12a19a31bf0"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        const colRef = collection(db, "camiones");

        // SEGURIDAD
        onAuthStateChanged(auth, async (user) => {
            if (!user || !user.email.toLowerCase().includes("opera")) {
                await signOut(auth);
                window.location.href = "index.html";
            }
        });

        window.cerrarSesion = () => signOut(auth);

        // CREAR VIAJE
        window.crearViaje = async () => {
            const patente = document.getElementById('patente').value.toUpperCase();
            const chofer = document.getElementById('chofer').value;
            if(!patente || !chofer) return alert("Completa los datos");
            await addDoc(colRef, { patente, chofer, estado: "Pendiente", timestamp: new Date() });
            document.getElementById('patente').value = "";
            document.getElementById('chofer').value = "";
        };

        // LISTA 1: PENDIENTES
        onSnapshot(query(colRef, where("estado", "==", "Pendiente")), (snapshot) => {
            const container = document.getElementById('lista-pendientes');
            container.innerHTML = "";
            snapshot.forEach(d => {
                const data = d.data();
                container.innerHTML += `
                    <div class="p-3 border rounded bg-orange-50 flex justify-between items-center shadow-sm">
                        <div><p class="font-bold">${data.patente}</p><p class="text-xs">${data.chofer}</p></div>
                        <div class="flex gap-1">
                            <button onclick="autorizar('${d.id}')" class="bg-green-600 text-white px-2 py-1 rounded text-xs">Autorizar</button>
                            <button onclick="abrirModal('${d.id}', '${data.patente}', '${data.chofer}')" class="bg-blue-500 text-white px-2 py-1 rounded text-xs">📝</button>
                        </div>
                    </div>`;
            });
        });

        // LISTA 2: GESTIÓN (Habilitados y En Planta)
        onSnapshot(query(colRef, where("estado", "in", ["Habilitado", "En Planta"])), (snapshot) => {
            const container = document.getElementById('lista-gestion');
            container.innerHTML = "";
            snapshot.forEach(d => {
                const data = d.data();
                const colorEstado = data.estado === "En Planta" ? "text-green-600 font-bold" : "text-blue-500";
                container.innerHTML += `
                    <div class="p-2 border-b flex justify-between items-center hover:bg-gray-50">
                        <div>
                            <span class="font-mono font-bold">${data.patente}</span> - 
                            <span class="${colorEstado}">${data.estado}</span>
                            <p class="text-[10px] text-gray-500">${data.chofer}</p>
                        </div>
                        <button onclick="abrirModal('${d.id}', '${data.patente}', '${data.chofer}')" class="text-blue-600 hover:underline text-xs">Editar</button>
                    </div>`;
            });
        });

        // FUNCIONES DE EDICIÓN
        window.autorizar = (id) => updateDoc(doc(db, "camiones", id), { estado: "Habilitado" });

        window.abrirModal = (id, patente, chofer) => {
            document.getElementById('edit-id').value = id;
            document.getElementById('edit-patente').value = patente;
            document.getElementById('edit-chofer').value = chofer;
            document.getElementById('modal-editar').classList.remove('hidden');
        };

        window.cerrarModal = () => document.getElementById('modal-editar').classList.add('hidden');

        window.guardarEdicion = async () => {
            const id = document.getElementById('edit-id').value;
            const newPatente = document.getElementById('edit-patente').value.toUpperCase();
            const newChofer = document.getElementById('edit-chofer').value;
            await updateDoc(doc(db, "camiones", id), { patente: newPatente, chofer: newChofer });
            cerrarModal();
        };
    </script>
</body>
</html>
