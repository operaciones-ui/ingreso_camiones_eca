<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logística: Control Total de Pesaje - ECA</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 p-4">
    <div class="max-w-5xl mx-auto">
        <div class="flex justify-between items-center mb-6">
            <h1 class="text-2xl font-bold text-orange-600 underline">Gestión y Monitoreo de Pesajes</h1>
            <button onclick="cerrarSesion()" class="text-xs bg-gray-500 text-white px-2 py-1 rounded hover:bg-gray-700">Cerrar Sesión</button>
        </div>

        <div class="bg-white p-4 rounded shadow mb-8 border-t-4 border-orange-500">
            <h2 class="font-bold mb-4 text-gray-700">Programar Nuevo Viaje</h2>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-2">
                <input id="patente" type="text" placeholder="Patente" class="border p-2 rounded uppercase outline-none focus:ring-2 focus:ring-orange-500">
                <input id="chofer" type="text" placeholder="Nombre Chofer" class="border p-2 rounded outline-none focus:ring-2 focus:ring-orange-500">
                <button onclick="crearViaje()" class="bg-orange-500 text-white p-2 rounded font-bold hover:bg-orange-600 transition">Registrar Viaje</button>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <div class="bg-white p-4 rounded shadow">
                <h2 class="font-bold mb-4 text-gray-700 flex items-center border-b pb-2">
                    <span class="w-3 h-3 bg-orange-500 rounded-full mr-2"></span> Por Autorizar
                </h2>
                <div id="lista-pendientes" class="space-y-3"></div>
            </div>

            <div class="lg:col-span-2 bg-white p-4 rounded shadow">
                <h2 class="font-bold mb-4 text-gray-700 flex items-center border-b pb-2">
                    <span class="w-3 h-3 bg-green-500 rounded-full mr-2"></span> Seguimiento de Cargas (Pesos)
                </h2>
                <div class="overflow-x-auto">
                    <table class="w-full text-sm text-left">
                        <thead class="bg-gray-50 text-gray-600 uppercase text-xs font-bold">
                            <tr>
                                <th class="p-2">Patente</th>
                                <th class="p-2">Estado</th>
                                <th class="p-2">Tara</th>
                                <th class="p-2">Bruto</th>
                                <th class="p-2">Neto</th>
                                <th class="p-2">Acción</th>
                            </tr>
                        </thead>
                        <tbody id="tabla-gestion">
                            </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <div id="modal-editar" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center p-4">
        <div class="bg-white p-6 rounded-lg shadow-xl w-full max-w-sm">
            <h3 class="font-bold text-lg mb-4 text-gray-800">Corregir Datos</h3>
            <input id="edit-id" type="hidden">
            <div class="space-y-3">
                <label class="block text-xs font-bold text-gray-500 uppercase">Patente</label>
                <input id="edit-patente" type="text" class="w-full border p-2 rounded uppercase outline-none focus:ring-2 focus:ring-blue-500">
                <label class="block text-xs font-bold text-gray-500 uppercase">Chofer</label>
                <input id="edit-chofer" type="text" class="w-full border p-2 rounded outline-none focus:ring-2 focus:ring-blue-500">
                <div class="flex gap-2 pt-4">
                    <button onclick="guardarEdicion()" class="flex-1 bg-blue-600 text-white p-2 rounded font-bold">Guardar</button>
                    <button onclick="cerrarModal()" class="flex-1 bg-gray-200 p-2 rounded font-bold">Cancelar</button>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, where, updateDoc, doc, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD59XE1FYbUPqiUjn7vBMT89PcGjB2Svzs",
            authDomain: "ingresocamiones.firebaseapp.com",
            projectId: "ingresocamiones",
            storageBucket: "ingresocamiones.firebasestorage.app",
            messagingSenderId: "170806305489",
            appId: "1:170806305489:web:0264fc24aec12a19a31bf0"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        const colRef = collection(db, "camiones");

        // SEGURIDAD
        onAuthStateChanged(auth, async (user) => {
            if (!user || !user.email.toLowerCase().includes("opera")) {
                await signOut(auth); window.location.href = "index.html";
            }
        });
        window.cerrarSesion = () => signOut(auth);

        // CREAR VIAJE
        window.crearViaje = async () => {
            const patente = document.getElementById('patente').value.toUpperCase();
            const chofer = document.getElementById('chofer').value;
            if(!patente || !chofer) return alert("Completa los datos");
            await addDoc(colRef, { patente, chofer, estado: "Pendiente", timestamp: new Date() });
            document.getElementById('patente').value = ""; document.getElementById('chofer').value = "";
        };

        // LISTA 1: PENDIENTES
        onSnapshot(query(colRef, where("estado", "==", "Pendiente")), (snapshot) => {
            const container = document.getElementById('lista-pendientes');
            container.innerHTML = "";
            snapshot.forEach(d => {
                const data = d.data();
                container.innerHTML += `
                    <div class="p-3 border rounded bg-orange-50 flex justify-between items-center shadow-sm">
                        <div><p class="font-bold text-sm uppercase">${data.patente}</p><p class="text-[10px] text-gray-500">${data.chofer}</p></div>
                        <div class="flex gap-1">
                            <button onclick="autorizar('${d.id}')" class="bg-green-600 text-white px-2 py-1 rounded text-[10px] font-bold">AUTORIZAR</button>
                            <button onclick="abrirModal('${d.id}', '${data.patente}', '${data.chofer}')" class="bg-gray-200 px-2 py-1 rounded text-[10px]">EDITAR</button>
                        </div>
                    </div>`;
            });
        });

        // TABLA DE GESTIÓN (PESOS EN TIEMPO REAL)
        onSnapshot(query(colRef, where("estado", "in", ["Habilitado", "En Planta", "Finalizado"])), (snapshot) => {
            const container = document.getElementById('tabla-gestion');
            container.innerHTML = "";
            snapshot.forEach(d => {
                const data = d.data();
                const tara = data.tara || 0;
                const bruto = data.bruto || 0;
                const neto = bruto > 0 ? (bruto - tara).toFixed(2) : "-";
                
                let colorBadge = data.estado === "Finalizado" ? "bg-gray-100 text-gray-600" : (data.estado === "En Planta" ? "bg-green-100 text-green-700" : "bg-blue-100 text-blue-700");

                container.innerHTML += `
                    <tr class="border-b hover:bg-gray-50 transition">
                        <td class="p-2 font-mono font-bold">${data.patente}</td>
                        <td class="p-2"><span class="px-2 py-1 rounded-full text-[10px] font-bold ${colorBadge}">${data.estado}</span></td>
                        <td class="p-2 text-gray-600">${tara} kg</td>
                        <td class="p-2 text-gray-600">${bruto} kg</td>
                        <td class="p-2 font-bold text-blue-600">${neto} kg</td>
                        <td class="p-2">
                            <button onclick="abrirModal('${d.id}', '${data.patente}', '${data.chofer}')" class="text-blue-500 hover:text-blue-700 text-xs font-bold underline">Editar</button>
                        </td>
                    </tr>`;
            });
        });

        // FUNCIONES DE EDICIÓN
        window.autorizar = (id) => updateDoc(doc(db, "camiones", id), { estado: "Habilitado" });
        window.abrirModal = (id, patente, chofer) => {
            document.getElementById('edit-id').value = id;
            document.getElementById('edit-patente').value = patente;
            document.getElementById('edit-chofer').value = chofer;
            document.getElementById('modal-editar').classList.remove('hidden');
        };
        window.cerrarModal = () => document.getElementById('modal-editar').classList.add('hidden');
        window.guardarEdicion = async () => {
            const id = document.getElementById('edit-id').value;
            const newPatente = document.getElementById('edit-patente').value.toUpperCase();
            const newChofer = document.getElementById('edit-chofer').value;
            await updateDoc(doc(db, "camiones", id), { patente: newPatente, chofer: newChofer });
            cerrarModal();
        };
    </script>
</body>
</html>
