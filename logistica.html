<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Módulo Logística - ECA</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 p-4">
    <div class="max-w-2xl mx-auto">
        <div class="flex justify-between items-center mb-6">
            <h1 class="text-2xl font-bold text-orange-600 underline">Panel de Logística</h1>
            <button onclick="cerrarSesion()" class="text-xs bg-gray-500 text-white px-2 py-1 rounded hover:bg-gray-700">Cerrar Sesión</button>
        </div>

        <div class="bg-white p-4 rounded shadow mb-8 border-t-4 border-orange-500">
            <h2 class="font-bold mb-2 text-gray-700">Programar Nuevo Viaje</h2>
            <div class="grid grid-cols-2 gap-2">
                <input id="patente" type="text" placeholder="Patente" class="border p-2 rounded focus:ring-2 focus:ring-orange-500 outline-none">
                <input id="chofer" type="text" placeholder="Nombre Chofer" class="border p-2 rounded focus:ring-2 focus:ring-orange-500 outline-none">
                <button onclick="crearViaje()" class="col-span-2 bg-orange-500 text-white p-2 rounded font-bold hover:bg-orange-600 transition">
                    Registrar y Pendiente
                </button>
            </div>
        </div>

        <div class="bg-white p-4 rounded shadow">
            <h2 class="font-bold mb-4 text-gray-700">Cargas por Autorizar</h2>
            <div id="lista-pendientes" class="space-y-3">
                <p class="text-gray-400 text-sm">Cargando datos...</p>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, where, updateDoc, doc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        // Importamos Auth para la seguridad
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD59XE1FYbUPqiUjn7vBMT89PcGjB2Svzs",
            authDomain: "ingresocamiones.firebaseapp.com",
            projectId: "ingresocamiones",
            storageBucket: "ingresocamiones.firebasestorage.app",
            messagingSenderId: "170806305489",
            appId: "1:170806305489:web:0264fc24aec12a19a31bf0"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        const colRef = collection(db, "camiones");

        // --- INICIO DEL DOBLE CANDADO ---
        onAuthStateChanged(auth, async (user) => {
            if (!user) {
                // Si no está logueado, lo saca al index
                window.location.href = "index.html";
            } else {
                const email = user.email.toLowerCase();
                // Si el mail NO contiene "opera", no tiene permiso para estar aquí
                if (!email.includes("opera")) {
                    alert("ACCESO DENEGADO: Tu perfil no tiene permisos para Logística.");
                    await signOut(auth);
                    window.location.href = "index.html";
                }
            }
        });

        window.cerrarSesion = () => signOut(auth);
        // --- FIN DEL DOBLE CANDADO ---

        window.crearViaje = async () => {
            const patente = document.getElementById('patente').value;
            const chofer = document.getElementById('chofer').value;
            if(!patente || !chofer) return alert("Completa los datos");
            
            try {
                await addDoc(colRef, { patente, chofer, estado: "Pendiente", fechaCreacion: new Date() });
                document.getElementById('patente').value = "";
                document.getElementById('chofer').value = "";
            } catch (e) {
                alert("Error al guardar: " + e.message);
            }
        };

        onSnapshot(query(colRef, where("estado", "==", "Pendiente")), (snapshot) => {
            const container = document.getElementById('lista-pendientes');
            container.innerHTML = snapshot.empty ? '<p class="text-gray-400 text-sm">No hay camiones pendientes.</p>' : "";
            snapshot.forEach(d => {
                const data = d.data();
                container.innerHTML += `
                    <div class="flex justify-between items-center p-3 border-l-4 border-orange-400 bg-orange-50 rounded shadow-sm">
                        <span><strong>${data.patente}</strong> - ${data.chofer}</span>
                        <button onclick="autorizar('${d.id}')" class="bg-green-600 text-white px-3 py-1 rounded text-sm font-semibold hover:bg-green-700 transition">
                            Autorizar Carga
                        </button>
                    </div>`;
            });
        });

        window.autorizar = (id) => updateDoc(doc(db, "camiones", id), { estado: "Habilitado" });
    </script>
</body>
</html>
