<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logística: Control Total - ECA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
</head>
<body class="bg-slate-100 p-4 font-sans text-gray-800">

    <div class="max-w-7xl mx-auto">
        <div class="flex justify-between items-center mb-6 bg-white p-4 rounded-lg shadow-sm border-l-8 border-orange-500">
            <div class="flex items-center gap-4">
                <img src="https://raw.githubusercontent.com/operaciones-ui/ingreso_camiones_eca/main/logo.png" 
                     alt="Logo ECA" class="h-12 w-auto rounded" onerror="this.src='https://via.placeholder.com/150?text=ECA'">
                <div>
                    <h1 class="text-2xl font-bold text-gray-800">ECA: Gestión de Exportación</h1>
                    <p class="text-xs text-orange-600 font-bold uppercase tracking-widest">Control de Balanza</p>
                </div>
            </div>
            <button onclick="cerrarSesion()" class="bg-gray-100 text-gray-500 px-4 py-2 rounded-lg font-bold text-xs hover:bg-red-500 hover:text-white transition-all">Cerrar Sesión</button>
        </div>

        <div class="bg-white p-6 rounded-xl shadow-md mb-8">
            <h2 class="font-black mb-4 text-gray-700 flex items-center text-sm uppercase italic"><span class="mr-2">📝</span> Nuevo Registro de Carga</h2>
            <div class="space-y-4">
                <div class="grid grid-cols-1 md:grid-cols-12 gap-3">
                    <div class="md:col-span-1">
                        <label class="block text-[10px] font-bold text-gray-400 uppercase mb-1">Ref.</label>
                        <input id="referencia" type="text" class="w-full border p-2 rounded bg-gray-50 text-xs outline-none focus:ring-1 focus:ring-orange-400">
                    </div>
                    <div class="md:col-span-3">
                        <label class="block text-[10px] font-bold text-gray-400 uppercase mb-1">Cliente / Exportador</label>
                        <input id="cliente" type="text" class="w-full border p-2 rounded bg-gray-50 text-xs font-bold outline-none focus:ring-1 focus:ring-orange-400">
                    </div>
                    <div class="md:col-span-2">
                        <label class="block text-[10px] font-bold text-gray-400 uppercase mb-1">Barco / Viaje</label>
                        <input id="barcoViaje" type="text" class="w-full border p-2 rounded bg-gray-50 text-xs outline-none focus:ring-1 focus:ring-orange-400">
                    </div>
                    <div class="md:col-span-1">
                        <label class="block text-[10px] font-bold text-gray-400 uppercase mb-1">Tipo</label>
                        <input id="tipoContenedor" type="text" placeholder="40HC" class="w-full border p-2 rounded bg-gray-50 text-xs outline-none focus:ring-1 focus:ring-orange-400">
                    </div>
                    <div class="md:col-span-3">
                        <label class="block text-[10px] font-bold text-orange-600 uppercase mb-1">N° Contenedor</label>
                        <input id="contenedor" type="text" class="w-full border border-orange-300 p-1.5 rounded bg-orange-50 uppercase font-mono font-bold text-base outline-none focus:ring-1 focus:ring-orange-500 text-orange-900 h-[32px]">
                    </div>
                    <div class="md:col-span-2">
                        <label class="block text-[10px] font-bold text-blue-600 uppercase mb-1">País Destino</label>
                        <input id="destino" type="text" class="w-full border p-2 rounded bg-blue-50 text-xs font-bold outline-none focus:ring-1 focus:ring-blue-400">
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-12 gap-3">
                    <div class="md:col-span-2">
                        <label class="block text-[10px] font-bold text-gray-400 uppercase mb-1">Transporte</label>
                        <input id="transporte" type="text" class="w-full border p-2 rounded bg-gray-50 text-xs outline-none focus:ring-1 focus:ring-orange-400">
                    </div>
                    <div class="md:col-span-3">
                        <label class="block text-[10px] font-bold text-gray-400 uppercase mb-1">Nombre Chofer</label>
                        <input id="chofer" list="lista-choferes" oninput="autocompletarChofer(this.value)" placeholder="Buscar..." class="w-full border p-2 rounded bg-gray-50 text-xs outline-none focus:ring-1 focus:ring-orange-400">
                        <datalist id="lista-choferes"></datalist>
                    </div>
                    <div class="md:col-span-1"> <label class="block text-[10px] font-bold text-gray-400 uppercase mb-1">DNI</label>
                        <input id="dni" type="text" class="w-full border p-2 rounded bg-gray-50 text-[10px] outline-none focus:ring-1 focus:ring-orange-400">
                    </div>
                    <div class="md:col-span-1"> <label class="block text-[10px] font-bold text-gray-400 uppercase mb-1">Pat. Camión</label>
                        <input id="patenteCamion" type="text" class="w-full border p-2 rounded bg-gray-50 text-[11px] font-mono uppercase outline-none focus:ring-1 focus:ring-orange-400">
                    </div>
                    <div class="md:col-span-1"> <label class="block text-[10px] font-bold text-gray-400 uppercase mb-1">Pat. Semi</label>
                        <input id="patenteSemi" type="text" class="w-full border p-2 rounded bg-gray-50 text-[11px] font-mono uppercase outline-none focus:ring-1 focus:ring-orange-400">
                    </div>
                    <div class="md:col-span-2">
                        <label class="block text-[10px] font-bold text-gray-400 uppercase mb-1">Celular</label>
                        <input id="celular" type="tel" class="w-full border p-2 rounded bg-gray-50 text-xs outline-none focus:ring-1 focus:ring-orange-400">
                    </div>
                    <div class="md:col-span-2 flex items-end">
                        <button onclick="crearViaje()" class="w-full bg-orange-600 text-white p-2 rounded font-black hover:bg-orange-700 transition-all uppercase text-[10px] shadow-lg h-[34px]">Registrar</button>
                    </div>
                </div>
            </div>
        </div>

        <h2 class="text-xs font-black text-gray-500 mb-2 uppercase tracking-widest">Cargas en Curso</h2>
        <div class="bg-white rounded-xl shadow-md overflow-hidden border border-gray-100 mb-10">
            <table class="w-full text-left text-xs">
                <thead>
                    <tr class="bg-gray-50 text-gray-400 border-b font-bold uppercase text-[10px]">
                        <th class="p-4">Ref / Cliente</th>
                        <th class="p-4">Contenedor</th>
                        <th class="p-4">Chofer / DNI</th>
                        <th class="p-4">Patentes</th>
                        <th class="p-4 text-center">Estado</th>
                        <th class="p-4 text-right">Acción</th>
                    </tr>
                </thead>
                <tbody id="tabla-gestion" class="divide-y divide-gray-100"></tbody>
            </table>
        </div>

        <div id="seccion-historial" class="mb-20">
            <div class="flex flex-col md:flex-row justify-between items-end mb-4 gap-4">
                <h2 class="text-xs font-black text-blue-500 uppercase tracking-widest">🕒 Historial de Cargas</h2>
                <div class="bg-white p-3 rounded-xl shadow-sm flex gap-3 items-end">
                    <input id="filtro-desde" type="date" class="text-xs border p-1 rounded">
                    <input id="filtro-hasta" type="date" class="text-xs border p-1 rounded">
                    <button onclick="exportarExcel()" class="bg-green-600 text-white px-4 py-2 rounded-lg text-xs font-black uppercase">Exportar Excel</button>
                </div>
            </div>
            <div class="bg-slate-200/50 rounded-xl shadow-inner overflow-hidden border border-slate-300">
                <table class="w-full text-left text-[11px]">
                    <tbody id="tabla-historial" class="divide-y divide-slate-200"></tbody>
                </table>
            </div>
        </div>
    </div>

    <div id="modal-editar" class="hidden fixed inset-0 bg-slate-900/90 backdrop-blur-sm flex items-center justify-center z-50 p-4">
        <div class="bg-white p-6 rounded-2xl w-full max-w-2xl">
            <h3 class="font-black mb-4">EDITAR REGISTRO</h3>
            <input id="edit-id" type="hidden">
            <div class="grid grid-cols-2 gap-4">
                <input id="edit-chofer" type="text" placeholder="Chofer" class="border p-2 rounded w-full">
                <input id="edit-dni" type="text" placeholder="DNI" class="border p-2 rounded w-full">
                <input id="edit-patenteCamion" type="text" placeholder="Patente Camión" class="border p-2 rounded w-full uppercase">
                <input id="edit-patenteSemi" type="text" placeholder="Patente Semi" class="border p-2 rounded w-full uppercase">
            </div>
            <div class="flex gap-2 mt-6">
                <button onclick="guardarEdicion()" class="bg-black text-white px-6 py-2 rounded font-bold">GUARDAR</button>
                <button onclick="cerrarModal()" class="bg-gray-200 px-6 py-2 rounded font-bold">CANCELAR</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, updateDoc, doc, getDoc, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD59XE1FYbUPqiUjn7vBMT89PcGjB2Svzs",
            authDomain: "ingresocamiones.firebaseapp.com",
            projectId: "ingresocamiones",
            storageBucket: "ingresocamiones.firebasestorage.app",
            messagingSenderId: "170806305489",
            appId: "1:170806305489:web:0264fc24aec12a19a31bf0"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        const colRef = collection(db, "camiones");

        // --- CHOFERES ---
        let baseChoferes = [];
        onSnapshot(collection(db, "choferes"), (snap) => {
            const datalist = document.getElementById('lista-choferes');
            datalist.innerHTML = "";
            baseChoferes = [];
            snap.forEach(doc => {
                const d = doc.data();
                baseChoferes.push({ nombre: d.nombre, transporte: d.transporte, celular: d.celular, dni: d.dni });
                const option = document.createElement('option');
                option.value = d.nombre;
                datalist.appendChild(option);
            });
        });

        window.autocompletarChofer = (valor) => {
            const encontrado = baseChoferes.find(c => c.nombre && c.nombre.toLowerCase() === valor.toLowerCase());
            if (encontrado) {
                document.getElementById('celular').value = encontrado.celular || "";
                document.getElementById('transporte').value = encontrado.transporte || "";
                document.getElementById('dni').value = encontrado.dni || "";
            }
        };

        // --- OPERACIONES ---
        window.crearViaje = async () => {
            const data = {
                referencia: document.getElementById('referencia').value,
                cliente: document.getElementById('cliente').value,
                barcoViaje: document.getElementById('barcoViaje').value,
                tipoContenedor: document.getElementById('tipoContenedor').value,
                contenedor: document.getElementById('contenedor').value.toUpperCase(),
                destino: document.getElementById('destino').value,
                transporte: document.getElementById('transporte').value,
                chofer: document.getElementById('chofer').value,
                dni: document.getElementById('dni').value,
                patenteCamion: document.getElementById('patenteCamion').value.toUpperCase(),
                patenteSemi: document.getElementById('patenteSemi').value.toUpperCase(),
                celular: document.getElementById('celular').value,
                estado: "Pendiente",
                tara: 0, bruto: 0, fecha: serverTimestamp()
            };
            await addDoc(colRef, data);
            document.querySelectorAll('input').forEach(i => i.value = "");
        };

        onSnapshot(query(colRef, orderBy("fecha", "desc")), (snapshot) => {
            const contActivos = document.getElementById('tabla-gestion');
            const contHistorial = document.getElementById('tabla-historial');
            contActivos.innerHTML = ""; contHistorial.innerHTML = "";
            
            snapshot.forEach(d => {
                const data = { id: d.id, ...d.data() };
                const fDia = data.fecha ? new Date(data.fecha.seconds * 1000).toLocaleDateString() : '---';

                if (data.estado !== "Finalizado") {
                    contActivos.innerHTML += `
                        <tr class="hover:bg-orange-50/50 border-b border-gray-50">
                            <td class="p-4"><b>${data.cliente}</b><br><small>${data.referencia || '-'}</small></td>
                            <td class="p-4 font-mono font-black text-orange-600">${data.contenedor}</td>
                            <td class="p-4"><b>${data.chofer}</b><br><small>DNI: ${data.dni || '-'}</small></td>
                            <td class="p-4 font-mono text-[10px]">C: ${data.patenteCamion || '-'}<br>S: ${data.patenteSemi || '-'}</td>
                            <td class="p-4 text-center"><span class="px-2 py-1 rounded text-[9px] font-bold bg-orange-100">${data.estado}</span></td>
                            <td class="p-4 text-right">
                                <button onclick="autorizar('${d.id}')" class="text-blue-600 font-bold mr-2">OK</button>
                                <button onclick="abrirModal('${d.id}')" class="text-gray-400">EDITAR</button>
                            </td>
                        </tr>`;
                } else {
                    contHistorial.innerHTML += `
                        <tr class="hover:bg-white border-b border-slate-200">
                            <td class="p-3">${fDia} - <b>${data.contenedor}</b></td>
                            <td class="p-3">${data.cliente}</td>
                            <td class="p-3">${data.chofer} (DNI: ${data.dni})</td>
                            <td class="p-3 text-right"><button onclick="abrirModal('${d.id}')">📝</button></td>
                        </tr>`;
                }
            });
        });

        window.autorizar = (id) => updateDoc(doc(db, "camiones", id), { estado: "Habilitado" });

        window.abrirModal = async (id) => {
            const snap = await getDoc(doc(db, "camiones", id));
            const d = snap.data();
            document.getElementById('edit-id').value = id;
            document.getElementById('edit-chofer').value = d.chofer || '';
            document.getElementById('edit-dni').value = d.dni || '';
            document.getElementById('edit-patenteCamion').value = d.patenteCamion || '';
            document.getElementById('edit-patenteSemi').value = d.patenteSemi || '';
            document.getElementById('modal-editar').classList.remove('hidden');
        };

        window.cerrarModal = () => document.getElementById('modal-editar').classList.add('hidden');

        window.guardarEdicion = async () => {
            const id = document.getElementById('edit-id').value;
            await updateDoc(doc(db, "camiones", id), {
                chofer: document.getElementById('edit-chofer').value,
                dni: document.getElementById('edit-dni').value,
                patenteCamion: document.getElementById('edit-patenteCamion').value.toUpperCase(),
                patenteSemi: document.getElementById('edit-patenteSemi').value.toUpperCase()
            });
            cerrarModal();
        };

        onAuthStateChanged(auth, (user) => { if (!user) window.location.href = "index.html"; });
        window.cerrarSesion = () => signOut(auth);
    </script>
</body>
</html>
