<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logística: Gestión de Contenedores - ECA</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 p-4 font-sans text-gray-800">

    <div class="max-w-7xl mx-auto">
        <div class="flex justify-between items-center mb-6 bg-white p-4 rounded-lg shadow-sm border-l-8 border-orange-500">
            <div>
                <h1 class="text-2xl font-bold text-gray-800">ECA: Gestión de Exportación</h1>
                <p class="text-xs text-orange-600 font-bold uppercase tracking-widest">Torre de Control de Contenedores</p>
            </div>
            <button onclick="cerrarSesion()" class="bg-gray-100 text-gray-500 px-4 py-2 rounded-lg font-bold text-xs hover:bg-red-500 hover:text-white transition-all">
                Cerrar Sesión
            </button>
        </div>

        <div class="bg-white p-6 rounded-xl shadow-md mb-8">
            <h2 class="font-black mb-4 text-gray-700 flex items-center text-sm uppercase italic">
                <span class="mr-2">📦</span> Nueva Carga / Booking
            </h2>
            <div class="grid grid-cols-1 md:grid-cols-3 lg:grid-cols-6 gap-4">
                <div class="lg:col-span-2">
                    <label class="block text-[10px] font-bold text-orange-600 uppercase mb-1">Número de Contenedor</label>
                    <input id="contenedor" type="text" placeholder="MSCU 123456-7" class="w-full border p-2 rounded bg-orange-50 uppercase font-mono font-bold outline-none focus:ring-2 focus:ring-orange-400">
                </div>
                <div>
                    <label class="block text-[10px] font-bold text-gray-400 uppercase mb-1">Patente Camión</label>
                    <input id="patente" type="text" placeholder="AAA 111" class="w-full border p-2 rounded bg-gray-50 uppercase font-mono outline-none focus:ring-2 focus:ring-gray-300">
                </div>
                <div>
                    <label class="block text-[10px] font-bold text-gray-400 uppercase mb-1">Patente Semi</label>
                    <input id="patenteSemi" type="text" placeholder="BBB 222" class="w-full border p-2 rounded bg-gray-50 uppercase font-mono outline-none focus:ring-2 focus:ring-gray-300">
                </div>
                <div class="lg:col-span-2">
                    <label class="block text-[10px] font-bold text-gray-400 uppercase mb-1">Empresa Transporte</label>
                    <input id="transporte" type="text" class="w-full border p-2 rounded bg-gray-50 outline-none focus:ring-2 focus:ring-gray-300">
                </div>

                <div class="lg:col-span-2">
                    <label class="block text-[10px] font-bold text-gray-400 uppercase mb-1">Cliente / Exportador</label>
                    <input id="cliente" type="text" class="w-full border p-2 rounded bg-gray-50 outline-none focus:ring-2 focus:ring-gray-300">
                </div>
                <div class="lg:col-span-1">
                    <label class="block text-[10px] font-bold text-blue-600 uppercase mb-1">Referencia</label>
                    <input id="referencia" type="text" class="w-full border border-blue-100 p-2 rounded bg-blue-50 outline-none focus:ring-2 focus:ring-blue-400 font-bold">
                </div>
                <div class="lg:col-span-1">
                    <label class="block text-[10px] font-bold text-gray-400 uppercase mb-1">Nombre Chofer</label>
                    <input id="chofer" type="text" class="w-full border p-2 rounded bg-gray-50 outline-none focus:ring-2 focus:ring-gray-300">
                </div>
                <div class="lg:col-span-2 flex items-end">
                    <button onclick="crearViaje()" class="w-full bg-orange-600 text-white p-2 rounded font-black hover:bg-orange-700 transition-all uppercase text-sm shadow-lg shadow-orange-100">
                        Registrar Carga
                    </button>
                </div>
            </div>
        </div>

        <div class="bg-white rounded-xl shadow-md overflow-hidden border border-gray-100">
            <div class="overflow-x-auto">
                <table class="w-full text-left text-xs">
                    <thead>
                        <tr class="bg-gray-50 text-gray-400 font-bold uppercase border-b">
                            <th class="p-4 text-orange-600">Contenedor / Patentes</th>
                            <th class="p-4">Cliente / Referencia</th>
                            <th class="p-4">Transporte / Chofer</th>
                            <th class="p-4 text-center">Estado</th>
                            <th class="p-4 text-center">Neto (Kg)</th>
                            <th class="p-4 text-right">Acción</th>
                        </tr>
                    </thead>
                    <tbody id="tabla-gestion" class="divide-y divide-gray-100"></tbody>
                </table>
            </div>
        </div>
    </div>

    <div id="modal-editar" class="hidden fixed inset-0 bg-slate-900/90 backdrop-blur-sm flex items-center justify-center p-4 z-50">
        <div class="bg-white p-6 rounded-2xl shadow-2xl w-full max-w-2xl border border-white">
            <h3 class="font-black text-xl mb-6 text-gray-800 border-b pb-4 uppercase tracking-tighter italic">✏️ Corregir Información</h3>
            <input id="edit-id" type="hidden">
            <div class="grid grid-cols-2 gap-4 text-sm">
                <div class="col-span-2 bg-orange-50 p-2 rounded border border-orange-100">
                    <label class="text-[10px] font-bold text-orange-600 uppercase">Número de Contenedor</label>
                    <input id="edit-contenedor" type="text" class="w-full bg-transparent font-black text-lg font-mono uppercase outline-none">
                </div>
                <div><label class="text-[10px] font-bold text-gray-400 uppercase">Patente Camión</label><input id="edit-patente" type="text" class="w-full border p-2 rounded font-mono uppercase bg-gray-50"></div>
                <div><label class="text-[10px] font-bold text-gray-400 uppercase">Patente Semi</label><input id="edit-patenteSemi" type="text" class="w-full border p-2 rounded font-mono uppercase bg-gray-50"></div>
                <div><label class="text-[10px] font-bold text-gray-400 uppercase">Cliente</label><input id="edit-cliente" type="text" class="w-full border p-2 rounded font-bold"></div>
                <div><label class="text-[10px] font-bold text-gray-400 uppercase">Referencia</label><input id="edit-referencia" type="text" class="w-full border p-2 rounded bg-blue-50 font-bold text-blue-600"></div>
                <div><label class="text-[10px] font-bold text-gray-400 uppercase">Transporte</label><input id="edit-transporte" type="text" class="w-full border p-2 rounded bg-gray-50"></div>
                <div><label class="text-[10px] font-bold text-gray-400 uppercase">Chofer</label><input id="edit-chofer" type="text" class="w-full border p-2 rounded bg-gray-50"></div>
                <div class="bg-orange-600 p-2 rounded text-white shadow-inner"><label class="text-[10px] font-bold uppercase opacity-80">Peso Tara (Kg)</label><input id="edit-tara" type="number" class="w-full bg-transparent font-black outline-none text-xl"></div>
                <div class="bg-blue-600 p-2 rounded text-white shadow-inner"><label class="text-[10px] font-bold uppercase opacity-80">Peso Bruto (Kg)</label><input id="edit-bruto" type="number" class="w-full bg-transparent font-black outline-none text-xl"></div>
            </div>
            <div class="flex gap-3 mt-8">
                <button onclick="guardarEdicion()" class="flex-1 bg-zinc-800 text-white p-4 rounded-xl font-black uppercase tracking-widest hover:bg-black transition-all">Guardar Cambios</button>
                <button onclick="cerrarModal()" class="flex-1 bg-gray-100 text-gray-400 p-4 rounded-xl font-black uppercase">Cancelar</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, updateDoc, doc, serverTimestamp, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD59XE1FYbUPqiUjn7vBMT89PcGjB2Svzs",
            authDomain: "ingresocamiones.firebaseapp.com",
            projectId: "ingresocamiones",
            storageBucket: "ingresocamiones.firebasestorage.app",
            messagingSenderId: "170806305489",
            appId: "1:170806305489:web:0264fc24aec12a19a31bf0"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        const colRef = collection(db, "camiones");

        onAuthStateChanged(auth, async (user) => {
            if (!user || !user.email.toLowerCase().includes("opera")) {
                await signOut(auth); window.location.href = "index.html";
            }
        });

        window.cerrarSesion = () => signOut(auth);

        window.crearViaje = async () => {
            const data = {
                contenedor: document.getElementById('contenedor').value.toUpperCase(),
                patente: document.getElementById('patente').value.toUpperCase(),
                patenteSemi: document.getElementById('patenteSemi').value.toUpperCase(),
                transporte: document.getElementById('transporte').value,
                chofer: document.getElementById('chofer').value,
                cliente: document.getElementById('cliente').value,
                referencia: document.getElementById('referencia').value,
                estado: "Pendiente",
                tara: 0, bruto: 0, fecha: serverTimestamp()
            };
            if(!data.contenedor) return alert("Debe ingresar el Número de Contenedor");
            await addDoc(colRef, data);
            document.querySelectorAll('input').forEach(i => i.value = "");
        };

        onSnapshot(query(colRef), (snapshot) => {
            const container = document.getElementById('tabla-gestion');
            container.innerHTML = "";
            snapshot.forEach(d => {
                const data = d.data();
                const neto = data.bruto > 0 ? (data.bruto - data.tara).toFixed(2) : "0.00";
                const estadoColor = data.estado === "Finalizado" ? "bg-gray-100 text-gray-500" : (data.estado === "En Planta" ? "bg-green-100 text-green-700 font-bold" : "bg-orange-100 text-orange-700");

                container.innerHTML += `
                    <tr class="hover:bg-orange-50/50 transition border-b border-gray-50">
                        <td class="p-4">
                            <p class="font-mono font-black text-orange-600 text-sm tracking-tighter">${data.contenedor || 'S/N'}</p>
                            <p class="text-gray-400 text-[10px] font-bold font-mono uppercase">${data.patente} / ${data.patenteSemi || '-'}</p>
                        </td>
                        <td class="p-4 font-bold text-gray-700">
                            ${data.cliente || '-'}
                            <br><span class="text-blue-500 text-[10px] font-black italic uppercase">Ref: ${data.referencia || '-'}</span>
                        </td>
                        <td class="p-4 font-bold">
                            ${data.transporte}
                            <br><span class="font-normal text-gray-400 text-[10px] uppercase">${data.chofer}</span>
                        </td>
                        <td class="p-4 text-center"><span class="px-2 py-1 rounded text-[9px] uppercase font-bold ${estadoColor}">${data.estado}</span></td>
                        <td class="p-4 text-center font-black text-blue-800 text-sm">${neto} Kg</td>
                        <td class="p-4 text-right">
                            <div class="flex flex-col gap-1 items-end">
                                ${data.estado === 'Pendiente' ? `<button onclick="autorizar('${d.id}')" class="bg-green-600 text-white px-3 py-1 rounded text-[10px] font-bold uppercase shadow-sm">Autorizar</button>` : ''}
                                <button onclick="abrirModal('${d.id}')" class="text-blue-500 hover:text-blue-700 font-black text-[10px] uppercase tracking-tighter">Corregir/Pesos</button>
                            </div>
                        </td>
                    </tr>`;
            });
        });

        window.autorizar = (id) => updateDoc(doc(db, "camiones", id), { estado: "Habilitado" });

        window.abrirModal = async (id) => {
            const snap = await getDoc(doc(db, "camiones", id));
            const data = snap.data();
            document.getElementById('edit-id').value = id;
            document.getElementById('edit-contenedor').value = data.contenedor || '';
            document.getElementById('edit-patente').value = data.patente;
            document.getElementById('edit-patenteSemi').value = data.patenteSemi || '';
            document.getElementById('edit-transporte').value = data.transporte || '';
            document.getElementById('edit-chofer').value = data.chofer;
            document.getElementById('edit-cliente').value = data.cliente || '';
            document.getElementById('edit-referencia').value = data.referencia || '';
            document.getElementById('edit-tara').value = data.tara;
            document.getElementById('edit-bruto').value = data.bruto;
            document.getElementById('modal-editar').classList.remove('hidden');
        };

        window.cerrarModal = () => document.getElementById('modal-editar').classList.add('hidden');

        window.guardarEdicion = async () => {
            const id = document.getElementById('edit-id').value;
            const up = {
                contenedor: document.getElementById('edit-contenedor').value.toUpperCase(),
                patente: document.getElementById('edit-patente').value.toUpperCase(),
                patenteSemi: document.getElementById('edit-patenteSemi').value.toUpperCase(),
                transporte: document.getElementById('edit-transporte').value,
                chofer: document.getElementById('edit-chofer').value,
                cliente: document.getElementById('edit-cliente').value,
                referencia: document.getElementById('edit-referencia').value,
                tara: parseFloat(document.getElementById('edit-tara').value) || 0,
                bruto: parseFloat(document.getElementById('edit-bruto').value) || 0
            };
            await updateDoc(doc(db, "camiones", id), up);
            cerrarModal();
        };
    </script>
</body>
</html>
