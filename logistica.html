<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logística: Control Total - ECA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
</head>
<body class="bg-slate-100 p-4 font-sans text-gray-800">

    <div class="max-w-7xl mx-auto">
        <div class="flex justify-between items-center mb-6 bg-white p-4 rounded-lg shadow-sm border-l-8 border-orange-500">
            <div class="flex items-center gap-4">
                <img src="https://raw.githubusercontent.com/operaciones-ui/ingreso_camiones_eca/main/logo.png" 
                     alt="Logo ECA" 
                     class="h-12 w-auto rounded"
                     onerror="this.src='https://via.placeholder.com/150?text=ECA+Logo'">
                <div>
                    <h1 class="text-2xl font-bold text-gray-800">ECA: Gestión de Exportación</h1>
                    <p class="text-xs text-orange-600 font-bold uppercase tracking-widest">Control de Balanza</p>
                </div>
            </div>
            <button onclick="cerrarSesion()" class="bg-gray-100 text-gray-500 px-4 py-2 rounded-lg font-bold text-xs hover:bg-red-500 hover:text-white transition-all">Cerrar Sesión</button>
        </div>

        <div class="bg-white p-6 rounded-xl shadow-md mb-8">
            <h2 class="font-black mb-4 text-gray-700 flex items-center text-sm uppercase italic"><span class="mr-2">📦</span> Registro de Carga</h2>
            <div class="grid grid-cols-1 md:grid-cols-4 lg:grid-cols-8 gap-4">
                <div class="lg:col-span-2 md:col-span-2">
                    <label class="block text-[10px] font-bold text-orange-600 uppercase mb-1">Número de Contenedor</label>
                    <input id="contenedor" type="text" placeholder="MSCU123456-7" class="w-full border p-2 rounded bg-orange-50 uppercase font-mono font-bold outline-none focus:ring-2 focus:ring-orange-400 text-sm">
                </div>
                <div class="lg:col-span-1 md:col-span-1">
                    <label class="block text-[10px] font-bold text-gray-400 uppercase mb-1">Patente Camión</label>
                    <input id="patente" type="text" placeholder="AAA 111" class="w-full border p-2 rounded bg-gray-50 uppercase font-mono text-sm">
                </div>
                <div class="lg:col-span-1 md:col-span-1">
                    <label class="block text-[10px] font-bold text-gray-400 uppercase mb-1">Patente Semi</label>
                    <input id="patenteSemi" type="text" placeholder="BBB 222" class="w-full border p-2 rounded bg-gray-50 uppercase font-mono text-sm">
                </div>
                <div class="lg:col-span-2 md:col-span-2">
                    <label class="block text-[10px] font-bold text-gray-400 uppercase mb-1">Empresa Transporte</label>
                    <input id="transporte" type="text" class="w-full border p-2 rounded bg-gray-50 text-sm">
                </div>
                <div class="lg:col-span-2 md:col-span-2">
                    <label class="block text-[10px] font-bold text-gray-400 uppercase mb-1">Nombre Chofer completo</label>
                    <input id="chofer" type="text" class="w-full border p-2 rounded bg-gray-50 text-sm">
                </div>
                <div class="lg:col-span-2 md:col-span-2">
                    <label class="block text-[10px] font-bold text-gray-400 uppercase mb-1">Cliente / Exportador</label>
                    <input id="cliente" type="text" class="w-full border p-2 rounded bg-gray-50 text-sm">
                </div>
                <div class="lg:col-span-2 md:col-span-2">
                    <label class="block text-[10px] font-bold text-blue-600 uppercase mb-1">País de Destino</label>
                    <input id="destino" type="text" placeholder="Ej: Brasil" class="w-full border border-blue-100 p-2 rounded bg-blue-50 font-bold text-sm outline-none focus:ring-2 focus:ring-blue-400">
                </div>
                <div class="lg:col-span-2 md:col-span-1">
                    <label class="block text-[10px] font-bold text-gray-400 uppercase mb-1">Referencia</label>
                    <input id="referencia" type="text" class="w-full border p-2 rounded bg-gray-50 text-sm">
                </div>
                <div class="lg:col-span-2 md:col-span-1 flex items-end">
                    <button onclick="crearViaje()" class="w-full bg-orange-600 text-white p-2 rounded font-black hover:bg-orange-700 transition-all uppercase text-xs shadow-lg h-[38px]">Registrar</button>
                </div>
            </div>
        </div>

        <h2 class="text-xs font-black text-gray-500 mb-2 uppercase tracking-widest">Cargas en Curso</h2>
        <div class="bg-white rounded-xl shadow-md overflow-hidden border border-gray-100 mb-10">
            <table class="w-full text-left text-xs">
                <thead>
                    <tr class="bg-gray-50 text-gray-400 border-b">
                        <th class="p-4 text-orange-600">Contenedor / Patentes</th>
                        <th class="p-4">Cliente / Destino</th>
                        <th class="p-4">Transporte</th>
                        <th class="p-4 text-center">Estado</th>
                        <th class="p-4 text-center">Neto</th>
                        <th class="p-4 text-right">Acción</th>
                    </tr>
                </thead>
                <tbody id="tabla-gestion" class="divide-y divide-gray-100"></tbody>
            </table>
        </div>

        <div class="flex flex-col md:flex-row justify-between items-end mb-4 gap-4">
            <h2 class="text-xs font-black text-blue-500 uppercase tracking-widest flex items-center">
                <span class="mr-2">🕒</span> Historial de Cargas Finalizadas
            </h2>
            <div class="bg-white p-3 rounded-xl shadow-sm border border-slate-200 flex flex-wrap gap-3 items-end">
                <div>
                    <label class="block text-[9px] font-bold text-gray-400 uppercase">Desde</label>
                    <input id="filtro-desde" type="date" class="text-xs border p-1 rounded outline-none focus:ring-1 focus:ring-blue-400">
                </div>
                <div>
                    <label class="block text-[9px] font-bold text-gray-400 uppercase">Hasta</label>
                    <input id="filtro-hasta" type="date" class="text-xs border p-1 rounded outline-none focus:ring-1 focus:ring-blue-400">
                </div>
                <button onclick="exportarExcel()" class="bg-green-600 hover:bg-green-700 text-white px-4 py-2 rounded-lg text-xs font-black uppercase flex items-center gap-2 transition-all">
                    <span>📊</span> Exportar Excel
                </button>
            </div>
        </div>

        <div class="bg-slate-200/50 rounded-xl shadow-inner overflow-hidden border border-slate-300">
            <table class="w-full text-left text-[11px]">
                <thead>
                    <tr class="bg-slate-300/50 text-slate-500 border-b border-slate-300 font-bold uppercase">
                        <th class="p-3">Fecha / Contenedor</th>
                        <th class="p-3">Cliente / Destino</th>
                        <th class="p-3">Referencia</th>
                        <th class="p-3 text-center">Tara/Bruto</th>
                        <th class="p-3 text-center font-black">Neto</th>
                        <th class="p-3 text-right">Tiempos</th>
                        <th class="p-3 text-right">...</th>
                    </tr>
                </thead>
                <tbody id="tabla-historial" class="divide-y divide-slate-200"></tbody>
            </table>
        </div>
    </div>

    <div id="modal-editar" class="hidden fixed inset-0 bg-slate-900/90 backdrop-blur-sm flex items-center justify-center p-4 z-50">
        <div class="bg-white p-6 rounded-2xl shadow-2xl w-full max-w-2xl text-sm">
            <h3 class="font-black text-xl mb-6 text-gray-800 border-b pb-4 uppercase">✏️ Editar Carga</h3>
            <input id="edit-id" type="hidden">
            <div class="grid grid-cols-2 gap-4">
                <div class="col-span-2"><label class="text-[10px] font-bold text-orange-600 uppercase">Contenedor</label><input id="edit-contenedor" type="text" class="w-full border-b-2 border-orange-200 font-black text-lg font-mono uppercase outline-none"></div>
                <div><label class="text-[10px] font-bold text-gray-400 uppercase">Patente Camión</label><input id="edit-patente" type="text" class="w-full border p-2 rounded uppercase font-mono"></div>
                <div><label class="text-[10px] font-bold text-gray-400 uppercase">Patente Semi</label><input id="edit-patenteSemi" type="text" class="w-full border p-2 rounded uppercase font-mono"></div>
                <div><label class="text-[10px] font-bold text-gray-400 uppercase">Cliente</label><input id="edit-cliente" type="text" class="w-full border p-2 rounded font-bold"></div>
                <div><label class="text-[10px] font-bold text-blue-600 uppercase">País Destino</label><input id="edit-destino" type="text" class="w-full border p-2 rounded font-bold bg-blue-50"></div>
                <div><label class="text-[10px] font-bold text-gray-400 uppercase">Referencia</label><input id="edit-referencia" type="text" class="w-full border p-2 rounded"></div>
                <div><label class="text-[10px] font-bold text-gray-400 uppercase">Transporte</label><input id="edit-transporte" type="text" class="w-full border p-2 rounded"></div>
                <div><label class="text-[10px] font-bold text-gray-400 uppercase">Chofer</label><input id="edit-chofer" type="text" class="w-full border p-2 rounded"></div>
                <div class="bg-orange-600 p-2 rounded text-white"><label class="text-[10px] font-bold uppercase opacity-80">Peso Tara (Kg)</label><input id="edit-tara" type="number" class="w-full bg-transparent font-black outline-none text-xl"></div>
                <div class="bg-blue-600 p-2 rounded text-white"><label class="text-[10px] font-bold uppercase opacity-80">Peso Bruto (Kg)</label><input id="edit-bruto" type="number" class="w-full bg-transparent font-black outline-none text-xl"></div>
            </div>
            <div class="flex gap-3 mt-8">
                <button onclick="guardarEdicion()" class="flex-1 bg-zinc-800 text-white p-4 rounded-xl font-black uppercase">Guardar Cambios</button>
                <button onclick="cerrarModal()" class="flex-1 bg-gray-100 text-gray-400 p-4 rounded-xl font-black uppercase">Cancelar</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, updateDoc, doc, deleteDoc, serverTimestamp, getDoc, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD59XE1FYbUPqiUjn7vBMT89PcGjB2Svzs",
            authDomain: "ingresocamiones.firebaseapp.com",
            projectId: "ingresocamiones",
            storageBucket: "ingresocamiones.firebasestorage.app",
            messagingSenderId: "170806305489",
            appId: "1:170806305489:web:0264fc24aec12a19a31bf0"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        const colRef = collection(db, "camiones");

        onAuthStateChanged(auth, (user) => { if (!user) window.location.href = "index.html"; });
        window.cerrarSesion = () => signOut(auth);

        let listaHistorialCompleta = [];

        window.crearViaje = async () => {
            const data = {
                contenedor: document.getElementById('contenedor').value.toUpperCase(),
                patente: document.getElementById('patente').value.toUpperCase(),
                patenteSemi: document.getElementById('patenteSemi').value.toUpperCase(),
                transporte: document.getElementById('transporte').value,
                chofer: document.getElementById('chofer').value,
                cliente: document.getElementById('cliente').value,
                destino: document.getElementById('destino').value,
                referencia: document.getElementById('referencia').value,
                estado: "Pendiente",
                tara: 0, bruto: 0, fecha: serverTimestamp()
            };
            if(!data.contenedor) return alert("Ingrese Contenedor");
            await addDoc(colRef, data);
            document.querySelectorAll('input').forEach(i => i.value = "");
        };

        onSnapshot(query(colRef, orderBy("fecha", "desc")), (snapshot) => {
            const contActivos = document.getElementById('tabla-gestion');
            const contHistorial = document.getElementById('tabla-historial');
            contActivos.innerHTML = ""; contHistorial.innerHTML = "";
            listaHistorialCompleta = [];

            snapshot.forEach(d => {
                const data = { id: d.id, ...d.data() };
                const neto = (data.bruto - data.tara).toFixed(2);
                const tEntrada = data.fechaIngreso ? new Date(data.fechaIngreso.seconds * 1000).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) : '--:--';
                const tSalida = data.fechaSalida ? new Date(data.fechaSalida.seconds * 1000).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) : '--:--';
                const fechaDia = data.fecha ? new Date(data.fecha.seconds * 1000).toLocaleDateString('es-AR', {day:'2-digit', month:'2-digit', year:'2-digit'}) : '---';

                if (data.estado !== "Finalizado") {
                    const estadoColor = data.estado === "En Planta" ? "bg-green-100 text-green-700" : "bg-orange-100 text-orange-700";
                    const botonAutorizar = data.estado === 'Pendiente' 
                        ? `<button onclick="autorizar('${d.id}')" class="bg-red-500 hover:bg-red-600 text-white px-3 py-1 rounded text-[10px] font-black animate-pulse shadow-md">AUTORIZAR INGRESO</button>` 
                        : `<span class="text-green-600 font-bold text-[10px] flex items-center gap-1">● AUTORIZADO</span>`;

                    contActivos.innerHTML += `
                        <tr class="hover:bg-orange-50/50 transition border-b border-gray-50">
                            <td class="p-4"><p class="font-mono font-black text-orange-600 text-sm">${data.contenedor}</p><p class="text-[10px] text-gray-400 font-mono font-bold uppercase">${data.patente} / ${data.patenteSemi || '-'}</p></td>
                            <td class="p-4 font-bold text-gray-700">${data.cliente}<br><div class="flex items-center gap-1 text-blue-600 text-[10px] font-black uppercase tracking-tighter"><span>📍</span>${data.destino || 'S/D'}</div></td>
                            <td class="p-4 font-bold text-gray-500 text-[10px] uppercase">${data.transporte}<br><span class="font-normal text-gray-400">${data.chofer}</span></td>
                            <td class="p-4 text-center"><span class="px-2 py-1 rounded text-[9px] uppercase font-bold ${estadoColor}">${data.estado}</span></td>
                            <td class="p-4 text-center font-black text-blue-800 text-sm">${neto > 0 ? neto : '0.00'} Kg</td>
                            <td class="p-4 text-right">
                                <div class="flex flex-col gap-2 items-end">
                                    ${botonAutorizar}
                                    <div class="flex gap-3 items-center">
                                        <button onclick="abrirModal('${d.id}')" class="text-blue-500 font-black text-[10px] uppercase hover:underline">Editar</button>
                                        <button onclick="eliminarCamion('${d.id}')" class="text-red-400 hover:text-red-600 transition-colors">
                                            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
                                            </svg>
                                        </button>
                                    </div>
                                </div>
                            </td>
                        </tr>`;
                } else {
                    listaHistorialCompleta.push(data);
                    contHistorial.innerHTML += `
                        <tr class="hover:bg-white transition border-b border-slate-200">
                            <td class="p-3 font-mono font-bold text-slate-600"><span class="text-[9px] text-slate-400 block">${fechaDia}</span>${data.contenedor}</td>
                            <td class="p-3"><b>${data.cliente}</b><br><div class="flex items-center gap-1 text-blue-600 text-[9px] font-bold uppercase tracking-tighter italic"><span>📍</span>${data.destino || 'S/D'}</div></td>
                            <td class="p-3 font-bold text-slate-500 uppercase">${data.referencia || '-'}</td>
                            <td class="p-3 text-center text-slate-500 leading-tight">${data.tara}<br>${data.bruto}</td>
                            <td class="p-3 text-center font-black text-blue-600 bg-blue-50/50">${neto} Kg</td>
                            <td class="p-3 text-right leading-tight text-[10px]"><span class="text-green-600 font-bold">IN: ${tEntrada}</span><br><span class="text-red-400 font-bold">OUT: ${tSalida}</span></td>
                            <td class="p-3 text-right"><button onclick="abrirModal('${d.id}')" class="text-slate-400 font-bold text-lg">📝</button></td>
                        </tr>`;
                }
            });
        });

        window.eliminarCamion = async (id) => {
            if (confirm("¿Está seguro de eliminar este registro? Se borrará de Logística y Portería.")) {
                await deleteDoc(doc(db, "camiones", id));
            }
        };

        window.autorizar = (id) => updateDoc(doc(db, "camiones", id), { estado: "Habilitado" });
        
        window.abrirModal = async (id) => {
            const snap = await getDoc(doc(db, "camiones", id)); const data = snap.data();
            document.getElementById('edit-id').value = id; 
            document.getElementById('edit-contenedor').value = data.contenedor || '';
            document.getElementById('edit-patente').value = data.patente; 
            document.getElementById('edit-patenteSemi').value = data.patenteSemi || '';
            document.getElementById('edit-cliente').value = data.cliente || ''; 
            document.getElementById('edit-destino').value = data.destino || '';
            document.getElementById('edit-referencia').value = data.referencia || ''; 
            document.getElementById('edit-transporte').value = data.transporte || '';
            document.getElementById('edit-chofer').value = data.chofer || ''; 
            document.getElementById('edit-tara').value = data.tara; 
            document.getElementById('edit-bruto').value = data.bruto;
            document.getElementById('modal-editar').classList.remove('hidden');
        };

        window.cerrarModal = () => document.getElementById('modal-editar').classList.add('hidden');

        window.guardarEdicion = async () => {
            const id = document.getElementById('edit-id').value;
            const up = {
                contenedor: document.getElementById('edit-contenedor').value.toUpperCase(), 
                patente: document.getElementById('edit-patente').value.toUpperCase(),
                patenteSemi: document.getElementById('edit-patenteSemi').value.toUpperCase(), 
                cliente: document.getElementById('edit-cliente').value,
                destino: document.getElementById('edit-destino').value, 
                referencia: document.getElementById('edit-referencia').value,
                transporte: document.getElementById('edit-transporte').value, 
                chofer: document.getElementById('edit-chofer').value,
                tara: parseFloat(document.getElementById('edit-tara').value) || 0, 
                bruto: parseFloat(document.getElementById('edit-bruto').value) || 0
            };
            await updateDoc(doc(db, "camiones", id), up); 
            cerrarModal();
        };

        window.exportarExcel = () => {
            const desde = document.getElementById('filtro-desde').value;
            const hasta = document.getElementById('filtro-hasta').value;
            if (!desde || !hasta) return alert("⚠️ Seleccione un rango de fechas");
            const fDesde = new Date(desde + "T00:00:00");
            const fHasta = new Date(hasta + "T23:59:59");
            const datosFiltrados = listaHistorialCompleta.filter(d => {
                const fechaCarga = new Date(d.fecha.seconds * 1000);
                return fechaCarga >= fDesde && fechaCarga <= fHasta;
            });
            if (datosFiltrados.length === 0) return alert("No hay datos en ese rango.");
            const rows = datosFiltrados.map(d => ({
                "FECHA": new Date(d.fecha.seconds * 1000).toLocaleDateString('es-AR'),
                "CONTENEDOR": d.contenedor,
                "CLIENTE": d.cliente,
                "DESTINO": d.destino || 'S/D',
                "REFERENCIA": d.referencia || '',
                "PATENTE": d.patente,
                "SEMI": d.patenteSemi || '',
                "TRANSPORTE": d.transporte,
                "CHOFER": d.chofer,
                "TARA_KG": d.tara,
                "BRUTO_KG": d.bruto,
                "NETO_KG": (d.bruto - d.tara),
                "HORA_ENTRADA": d.fechaIngreso ? new Date(d.fechaIngreso.seconds * 1000).toLocaleTimeString() : '',
                "HORA_SALIDA": d.fechaSalida ? new Date(d.fechaSalida.seconds * 1000).toLocaleTimeString() : ''
            }));
            const worksheet = XLSX.utils.json_to_sheet(rows);
            const workbook = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(workbook, worksheet, "Historial ECA");
            XLSX.writeFile(workbook, `Reporte_Logistica_${desde}_a_${hasta}.xlsx`);
        };
    </script>
</body>
</html>
