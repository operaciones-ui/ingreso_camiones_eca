<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logística: Gestión y Pesaje Total - ECA</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 p-4 font-sans text-gray-800">

    <div class="max-w-6xl mx-auto">
        <div class="flex justify-between items-center mb-6 bg-white p-4 rounded-lg shadow-sm">
            <div>
                <h1 class="text-2xl font-bold text-orange-600">ECA: Gestión Logística</h1>
                <p class="text-xs text-gray-500 italic">Panel de Control de Unidades y Pesajes</p>
            </div>
            <button onclick="cerrarSesion()" class="bg-red-50 text-red-600 px-4 py-2 rounded-lg font-bold text-sm hover:bg-red-600 hover:text-white transition">
                Cerrar Sesión
            </button>
        </div>

        <div class="bg-white p-6 rounded-xl shadow-md mb-8 border-t-4 border-orange-500">
            <h2 class="font-bold mb-4 text-gray-700 flex items-center italic">
                <span class="mr-2">🚛</span> Programar Nuevo Viaje
            </h2>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                <div>
                    <label class="block text-[10px] font-bold text-gray-400 uppercase mb-1">Patente</label>
                    <input id="patente" type="text" placeholder="ABC-123" class="w-full border p-3 rounded-lg uppercase outline-none focus:ring-2 focus:ring-orange-500 font-mono">
                </div>
                <div>
                    <label class="block text-[10px] font-bold text-gray-400 uppercase mb-1">Nombre del Chofer</label>
                    <input id="chofer" type="text" placeholder="Nombre completo" class="w-full border p-3 rounded-lg outline-none focus:ring-2 focus:ring-orange-500">
                </div>
                <div class="flex items-end">
                    <button onclick="crearViaje()" class="w-full bg-orange-500 text-white p-3 rounded-lg font-bold hover:bg-orange-600 shadow-lg shadow-orange-200 transition">
                        REGISTRAR PENDIENTE
                    </button>
                </div>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-4 gap-6">
            
            <div class="lg:col-span-1 space-y-4">
                <h2 class="font-bold text-gray-600 flex items-center px-2 uppercase text-xs tracking-widest">
                    <span class="w-2 h-2 bg-orange-500 rounded-full mr-2 animate-pulse"></span> Por Autorizar
                </h2>
                <div id="lista-pendientes" class="space-y-3">
                    </div>
            </div>

            <div class="lg:col-span-3">
                <h2 class="font-bold text-gray-600 flex items-center px-2 uppercase text-xs tracking-widest mb-4">
                    <span class="w-2 h-2 bg-green-500 rounded-full mr-2"></span> Monitoreo en Planta y Finalizados
                </h2>
                <div class="bg-white rounded-xl shadow-md overflow-hidden">
                    <table class="w-full text-left border-collapse">
                        <thead>
                            <tr class="bg-gray-50 border-b border-gray-100 text-[10px] uppercase text-gray-400 font-black">
                                <th class="p-4">Unidad</th>
                                <th class="p-4">Estado</th>
                                <th class="p-4 text-center">Tara (Kg)</th>
                                <th class="p-4 text-center">Bruto (Kg)</th>
                                <th class="p-4 text-center">Neto (Kg)</th>
                                <th class="p-4 text-right">Gestión</th>
                            </tr>
                        </thead>
                        <tbody id="tabla-gestion" class="divide-y divide-gray-50 text-sm">
                            </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <div id="modal-editar" class="hidden fixed inset-0 bg-slate-900/80 flex items-center justify-center p-4 z-50 backdrop-blur-sm">
        <div class="bg-white p-6 rounded-2xl shadow-2xl w-full max-w-md border border-gray-100">
            <h3 class="font-black text-xl mb-1 text-gray-800">Corregir Viaje</h3>
            <p class="text-xs text-gray-400 mb-6 uppercase tracking-widest border-b pb-4">Solo Logística puede editar pesos</p>
            
            <input id="edit-id" type="hidden">
            
            <div class="grid grid-cols-2 gap-4">
                <div class="col-span-2">
                    <label class="block text-[10px] font-bold text-gray-400 uppercase mb-1">Patente</label>
                    <input id="edit-patente" type="text" class="w-full border p-3 rounded-xl uppercase font-mono focus:ring-2 focus:ring-blue-500 outline-none">
                </div>
                <div class="col-span-2">
                    <label class="block text-[10px] font-bold text-gray-400 uppercase mb-1">Chofer</label>
                    <input id="edit-chofer" type="text" class="w-full border p-3 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none">
                </div>
                <div>
                    <label class="block text-[10px] font-bold text-orange-500 uppercase mb-1">Peso Tara</label>
                    <input id="edit-tara" type="number" step="0.01" class="w-full border-orange-100 border bg-orange-50 p-3 rounded-xl font-bold">
                </div>
                <div>
                    <label class="block text-[10px] font-bold text-blue-500 uppercase mb-1">Peso Bruto</label>
                    <input id="edit-bruto" type="number" step="0.01" class="w-full border-blue-100 border bg-blue-50 p-3 rounded-xl font-bold">
                </div>
            </div>

            <div class="flex gap-3 mt-8">
                <button onclick="guardarEdicion()" class="flex-1 bg-blue-600 text-white p-3 rounded-xl font-bold hover:bg-blue-700 shadow-lg shadow-blue-200 transition">
                    GUARDAR CAMBIOS
                </button>
                <button onclick="cerrarModal()" class="flex-1 bg-gray-100 text-gray-500 p-3 rounded-xl font-bold hover:bg-gray-200 transition">
                    CANCELAR
                </button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, where, updateDoc, doc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD59XE1FYbUPqiUjn7vBMT89PcGjB2Svzs",
            authDomain: "ingresocamiones.firebaseapp.com",
            projectId: "ingresocamiones",
            storageBucket: "ingresocamiones.firebasestorage.app",
            messagingSenderId: "170806305489",
            appId: "1:170806305489:web:0264fc24aec12a19a31bf0"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        const colRef = collection(db, "camiones");

        // SEGURIDAD: DOBLE CANDADO
        onAuthStateChanged(auth, async (user) => {
            if (!user || !user.email.toLowerCase().includes("opera")) {
                await signOut(auth);
                window.location.href = "index.html";
            }
        });

        window.cerrarSesion = () => signOut(auth);

        // CREAR VIAJE
        window.crearViaje = async () => {
            const patente = document.getElementById('patente').value.trim().toUpperCase();
            const chofer = document.getElementById('chofer').value.trim();
            if(!patente || !chofer) return alert("Completa los datos");
            
            await addDoc(colRef, { 
                patente, 
                chofer, 
                estado: "Pendiente", 
                tara: 0, 
                bruto: 0, 
                fechaRegistro: serverTimestamp() 
            });
            
            document.getElementById('patente').value = "";
            document.getElementById('chofer').value = "";
        };

        // LISTA 1: PENDIENTES (IZQUIERDA)
        onSnapshot(query(colRef, where("estado", "==", "Pendiente")), (snapshot) => {
            const container = document.getElementById('lista-pendientes');
            container.innerHTML = "";
            snapshot.forEach(d => {
                const data = d.data();
                container.innerHTML += `
                    <div class="p-4 bg-white rounded-xl shadow-sm border border-orange-100 flex justify-between items-center group">
                        <div>
                            <p class="font-black text-orange-600 font-mono">${data.patente}</p>
                            <p class="text-[10px] text-gray-400 font-bold uppercase">${data.chofer}</p>
                        </div>
                        <div class="flex gap-1">
                            <button onclick="autorizar('${d.id}')" class="bg-green-500 text-white p-2 rounded-lg text-[10px] font-bold hover:bg-green-600 transition">OK</button>
                            <button onclick="abrirModal('${d.id}', '${data.patente}', '${data.chofer}', ${data.tara}, ${data.bruto})" class="bg-gray-100 text-gray-400 p-2 rounded-lg text-[10px] hover:bg-gray-200 transition">📝</button>
                        </div>
                    </div>`;
            });
        });

        // LISTA 2: GESTIÓN DE PESOS (TABLA)
        onSnapshot(query(colRef, where("estado", "in", ["Habilitado", "En Planta", "Finalizado"])), (snapshot) => {
            const container = document.getElementById('tabla-gestion');
            container.innerHTML = "";
            snapshot.forEach(d => {
                const data = d.data();
                const tara = data.tara || 0;
                const bruto = data.bruto || 0;
                const neto = (bruto > 0) ? (bruto - tara).toFixed(2) : "0.00";
                
                let badgeClass = data.estado === "Finalizado" ? "bg-gray-100 text-gray-500" : (data.estado === "En Planta" ? "bg-green-100 text-green-600" : "bg-blue-100 text-blue-600");

                container.innerHTML += `
                    <tr class="hover:bg-gray-50 transition">
                        <td class="p-4 font-mono font-bold">${data.patente}</td>
                        <td class="p-4"><span class="px-2 py-1 rounded-full text-[9px] font-black uppercase ${badgeClass}">${data.estado}</span></td>
                        <td class="p-4 text-center font-mono text-gray-500">${tara}</td>
                        <td class="p-4 text-center font-mono text-gray-500">${bruto}</td>
                        <td class="p-4 text-center font-mono font-black text-blue-600">${neto}</td>
                        <td class="p-4 text-right">
                            <button onclick="abrirModal('${d.id}', '${data.patente}', '${data.chofer}', ${tara}, ${bruto})" class="text-xs font-bold text-blue-500 hover:underline px-2">Corregir</button>
                        </td>
                    </tr>`;
            });
        });

        // FUNCIONES DE EDICIÓN
        window.autorizar = (id) => updateDoc(doc(db, "camiones", id), { estado: "Habilitado" });

        window.abrirModal = (id, patente, chofer, tara, bruto) => {
            document.getElementById('edit-id').value = id;
            document.getElementById('edit-patente').value = patente;
            document.getElementById('edit-chofer').value = chofer;
            document.getElementById('edit-tara').value = tara;
            document.getElementById('edit-bruto').value = bruto;
            document.getElementById('modal-editar').classList.remove('hidden');
        };

        window.cerrarModal = () => document.getElementById('modal-editar').classList.add('hidden');

        window.guardarEdicion = async () => {
            const id = document.getElementById('edit-id').value;
            const upData = {
                patente: document.getElementById('edit-patente').value.toUpperCase(),
                chofer: document.getElementById('edit-chofer').value,
                tara: parseFloat(document.getElementById('edit-tara').value) || 0,
                bruto: parseFloat(document.getElementById('edit-bruto').value) || 0
            };
            await updateDoc(doc(db, "camiones", id), upData);
            cerrarModal();
        };
    </script>
</body>
</html>
