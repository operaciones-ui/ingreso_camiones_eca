<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portería: Control de Carga - ECA</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-zinc-900 text-white p-4 font-sans">
    <div class="max-w-4xl mx-auto">
        <div class="flex justify-between items-center mb-6 border-b border-zinc-800 pb-4">
            <div>
                <h1 class="text-2xl font-bold text-orange-500 tracking-tighter">Portería: Balanza</h1>
                <p class="text-[10px] text-zinc-500 uppercase tracking-widest font-bold">Gestión por Contenedor</p>
            </div>
            <button onclick="cerrarSesion()" class="text-xs bg-zinc-800 text-gray-400 px-3 py-2 rounded-lg hover:bg-zinc-700 transition">Salir</button>
        </div>

        <div class="flex gap-2 mb-6">
            <button onclick="cambiarTab('tab-entrada')" id="btn-tab-entrada" class="flex-1 p-4 rounded-xl font-black text-sm bg-orange-600 text-white shadow-lg transition-all italic">ENTRADA (TARA)</button>
            <button onclick="cambiarTab('tab-salida')" id="btn-tab-salida" class="flex-1 p-4 rounded-xl font-black text-sm bg-zinc-800 text-gray-500 transition-all italic">SALIDA (BRUTO)</button>
        </div>

        <div id="tab-entrada" class="space-y-4">
            <div id="lista-habilitados" class="space-y-4"></div>
        </div>
        <div id="tab-salida" class="hidden space-y-4">
            <div id="lista-en-planta" class="space-y-4"></div>
        </div>
    </div>

    <div id="modal-pesaje" class="hidden fixed inset-0 bg-black/95 backdrop-blur-md flex items-center justify-center p-4 z-50">
        <div class="bg-zinc-800 p-6 rounded-2xl border border-zinc-700 w-full max-w-md shadow-2xl">
            <h3 id="modal-titulo" class="font-black text-2xl mb-2 text-orange-500 uppercase italic">PESAJE</h3>
            <div id="modal-info-unidad" class="bg-zinc-900 p-4 rounded-xl mb-6 border border-zinc-700 text-center"></div>
            <input id="peso-input" type="number" class="w-full bg-black border-2 border-zinc-700 p-6 rounded-xl text-5xl text-center mb-6 text-white font-mono outline-none focus:border-orange-500" placeholder="0">
            <div class="flex gap-3">
                <button id="btn-confirmar-peso" class="flex-1 bg-orange-600 p-4 rounded-xl font-black uppercase hover:bg-orange-500 transition-all">Confirmar Peso</button>
                <button onclick="cerrarModal()" class="flex-1 bg-zinc-700 p-4 rounded-xl font-black text-zinc-400 uppercase">Volver</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, onSnapshot, query, where, updateDoc, doc, serverTimestamp, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD59XE1FYbUPqiUjn7vBMT89PcGjB2Svzs",
            authDomain: "ingresocamiones.firebaseapp.com",
            projectId: "ingresocamiones",
            storageBucket: "ingresocamiones.firebasestorage.app",
            messagingSenderId: "170806305489",
            appId: "1:170806305489:web:0264fc24aec12a19a31bf0"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        onAuthStateChanged(auth, async (user) => {
            if (!user || !user.email.toLowerCase().includes("recepc")) { await signOut(auth); window.location.href = "index.html"; }
        });

        window.cerrarSesion = () => signOut(auth);

        const crearTarjeta = (id, data, esEntrada) => {
            return `
            <div class="bg-zinc-800 p-5 rounded-2xl border-l-8 ${esEntrada ? 'border-orange-500' : 'border-blue-500'} shadow-xl">
                <div class="mb-4">
                    <p class="text-[10px] text-zinc-500 font-bold uppercase tracking-widest">Contenedor</p>
                    <p class="text-3xl font-mono font-black text-orange-500 leading-none mt-1">${data.contenedor}</p>
                </div>
                <div class="grid grid-cols-2 gap-4 border-t border-zinc-700/50 pt-4 mb-4">
                    <div>
                        <p class="text-[10px] text-zinc-500 font-bold uppercase italic">Patentes</p>
                        <p class="text-sm font-mono font-bold text-white uppercase">${data.patente} / ${data.patenteSemi || '-'}</p>
                    </div>
                    <div class="text-right">
                        <p class="text-[10px] text-zinc-500 font-bold uppercase italic">Destino</p>
                        <p class="text-sm font-bold text-blue-400 uppercase tracking-tighter">📍 ${data.destino || 'S/D'}</p>
                    </div>
                </div>
                <div class="bg-zinc-900/50 p-3 rounded-xl mb-4 flex justify-between items-center text-xs">
                    <div><span class="text-zinc-500 block font-bold uppercase text-[9px]">Transporte</span><span class="text-zinc-300 font-bold">${data.transporte}</span></div>
                    <div class="text-right"><span class="text-zinc-500 block font-bold uppercase text-[9px]">Cliente</span><span class="text-zinc-300">${data.cliente}</span></div>
                </div>
                <button onclick="prepararPesaje('${id}', '${data.contenedor}', '${esEntrada ? 'ingreso' : 'salida'}')" 
                    class="w-full ${esEntrada ? 'bg-orange-600 hover:bg-orange-500' : 'bg-blue-600 hover:bg-blue-500'} p-4 rounded-xl font-black text-sm uppercase transition-all">
                    ${esEntrada ? 'Registrar Tara' : 'Registrar Bruto'}
                </button>
            </div>`;
        };

        onSnapshot(query(collection(db, "camiones"), where("estado", "in", ["Habilitado", "Pendiente"])), (snap) => {
            const cont = document.getElementById('lista-habilitados');
            cont.innerHTML = snap.empty ? '<p class="text-center py-10 text-zinc-600 italic">No hay ingresos hoy.</p>' : "";
            snap.forEach(d => cont.innerHTML += crearTarjeta(d.id, d.data(), true));
        });

        onSnapshot(query(collection(db, "camiones"), where("estado", "==", "En Planta")), (snap) => {
            const cont = document.getElementById('lista-en-planta');
            cont.innerHTML = snap.empty ? '<p class="text-center py-10 text-zinc-600 italic">No hay unidades en predio.</p>' : "";
            snap.forEach(d => cont.innerHTML += crearTarjeta(d.id, d.data(), false));
        });

        let currentId = null; let modoAccion = "";
        window.prepararPesaje = async (id, contenedor, modo) => {
            currentId = id; modoAccion = modo;
            const snap = await getDoc(doc(db, "camiones", id)); const d = snap.data();
            document.getElementById('modal-titulo').innerText = modo === 'ingreso' ? "ENTRADA: TARA" : "SALIDA: BRUTO";
            document.getElementById('modal-info-unidad').innerHTML = `<p class="text-3xl font-mono font-black text-white">${d.contenedor}</p><p class="text-xs text-zinc-500 uppercase mt-2">${d.cliente} 📍 ${d.destino || ''}</p>`;
            document.getElementById('peso-input').value = ""; document.getElementById('modal-pesaje').classList.remove('hidden');
        };

        window.cerrarModal = () => document.getElementById('modal-pesaje').classList.add('hidden');

        document.getElementById('btn-confirmar-peso').onclick = async () => {
            const peso = parseFloat(document.getElementById('peso-input').value);
            if (!peso || peso <= 0) return alert("Peso inválido");
            const docRef = doc(db, "camiones", currentId);
            if (modoAccion === "ingreso") { await updateDoc(docRef, { tara: peso, estado: "En Planta", fechaIngreso: serverTimestamp() }); }
            else { await updateDoc(docRef, { bruto: peso, estado: "Finalizado", fechaSalida: serverTimestamp() }); }
            cerrarModal();
        };

        window.cambiarTab = (tabId) => {
            document.getElementById('tab-entrada').classList.toggle('hidden', tabId !== 'tab-entrada');
            document.getElementById('tab-salida').classList.toggle('hidden', tabId !== 'tab-salida');
            document.getElementById('btn-tab-entrada').className = `flex-1 p-4 rounded-xl font-black text-sm transition-all ${tabId === 'tab-entrada' ? 'bg-orange-600 text-white shadow-lg' : 'bg-zinc-800 text-gray-500'}`;
            document.getElementById('btn-tab-salida').className = `flex-1 p-4 rounded-xl font-black text-sm transition-all ${tabId === 'tab-salida' ? 'bg-blue-700 text-white shadow-lg' : 'bg-zinc-800 text-gray-500'}`;
        };
    </script>
</body>
</html>
