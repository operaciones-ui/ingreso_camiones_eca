<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Módulo Portería</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-zinc-900 text-white p-4">
    <div class="max-w-2xl mx-auto">
        <h1 class="text-2xl font-bold text-green-400 mb-6 border-b border-green-900 pb-2">Acceso Planta: Camiones Habilitados</h1>

        <div id="lista-habilitados" class="space-y-4">
            </div>
    </div>

    <script type="module">

        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const auth = getAuth(app);
        onAuthStateChanged(auth, (user) => {
            if (!user) {
            // Si no está logueado, lo manda al login
            window.location.href = "index.html";
            }
        });
        
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, onSnapshot, query, where, updateDoc, doc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD59XE1FYbUPqiUjn7vBMT89PcGjB2Svzs",
            authDomain: "ingresocamiones.firebaseapp.com",
            projectId: "ingresocamiones",
            storageBucket: "ingresocamiones.firebasestorage.app",
            messagingSenderId: "170806305489",
            appId: "1:170806305489:web:0264fc24aec12a19a31bf0"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        onSnapshot(query(collection(db, "camiones"), where("estado", "==", "Habilitado")), (snapshot) => {
            const container = document.getElementById('lista-habilitados');
            container.innerHTML = snapshot.empty ? '<p class="text-gray-500 text-center">No hay camiones autorizados por el momento.</p>' : "";
            snapshot.forEach(d => {
                const data = d.data();
                container.innerHTML += `
                    <div class="bg-zinc-800 p-4 rounded-lg flex justify-between items-center border border-zinc-700">
                        <div>
                            <p class="text-xl font-mono text-green-400">${data.patente}</p>
                            <p class="text-gray-400">${data.chofer}</p>
                        </div>
                        <button onclick="ingresar('${d.id}')" class="bg-green-600 hover:bg-green-500 text-white px-6 py-2 rounded font-bold transition">
                            DAR INGRESO
                        </button>
                    </div>`;
            });
        });

        window.ingresar = (id) => updateDoc(doc(db, "camiones", id), { 
            estado: "En Planta",
            fechaIngreso: serverTimestamp() 
        });
    </script>
</body>
</html>
