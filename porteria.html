<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Balanza: Control de Carga - ECA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes pulse-custom {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        .animate-pulse-fast {
            animation: pulse-custom 0.8s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
        /* Estilos específicos para el rediseño del modal */
        .digital-display {
            background: linear-gradient(180deg, #000 0%, #111 100%);
            box-shadow: inset 0 0 20px rgba(249, 115, 22, 0.1);
        }
        .input-huge::-webkit-inner-spin-button, 
        .input-huge::-webkit-outer-spin-button { 
            -webkit-appearance: none; margin: 0; 
        }
    </style>
</head>
<body class="bg-zinc-900 text-white p-4 font-sans">
    <div class="max-w-4xl mx-auto">
        
        <div class="flex justify-between items-center mb-6 border-b border-zinc-800 pb-4">
            <div class="flex items-center gap-4">
                <img src="https://raw.githubusercontent.com/operaciones-ui/ingreso_camiones_eca/main/logo.png" 
                     alt="Logo ECA" 
                     class="h-14 w-auto rounded bg-white p-1"
                     onerror="this.src='https://via.placeholder.com/150?text=ECA'">
                <div>
                    <h1 class="text-3xl font-bold text-orange-500 tracking-tighter">Recepcion / Balanza</h1>
                    <p class="text-[11px] text-zinc-500 uppercase tracking-widest font-bold">Gestión de Ingreso/Egreso</p>
                </div>
            </div>
            <button onclick="cerrarSesion()" class="text-xs bg-zinc-800 text-gray-400 px-3 py-2 rounded-lg hover:bg-zinc-700 transition">Salir</button>
        </div>

        <div class="flex gap-2 mb-6">
            <button onclick="cambiarTab('tab-entrada')" id="btn-tab-entrada" class="flex-1 p-4 rounded-xl font-black text-sm bg-orange-600 text-white shadow-lg transition-all italic text-center">ENTRADA (TARA)</button>
            <button onclick="cambiarTab('tab-salida')" id="btn-tab-salida" class="flex-1 p-4 rounded-xl font-black text-sm bg-zinc-800 text-gray-500 transition-all italic text-center">SALIDA (BRUTO)</button>
        </div>

        <div id="tab-entrada" class="space-y-4">
            <div id="lista-habilitados" class="space-y-4"></div>
        </div>
        <div id="tab-salida" class="hidden space-y-4">
            <div id="lista-en-planta" class="space-y-4"></div>
        </div>
    </div>

    <div id="modal-pesaje" class="hidden fixed inset-0 bg-black/90 backdrop-blur-sm flex items-center justify-center p-4 z-50">
        <div class="bg-zinc-900 w-full max-w-md rounded-3xl border-2 border-zinc-700 shadow-[0_0_50px_rgba(0,0,0,0.5)] overflow-hidden">
            <div class="bg-zinc-800 p-4 border-b border-zinc-700 flex justify-between items-center">
                <h3 id="modal-titulo" class="font-black text-lg text-orange-500 uppercase italic tracking-tighter">PESAJE DISPONIBLE</h3>
                <span class="bg-orange-500/10 text-orange-500 text-[10px] font-bold px-2 py-1 rounded border border-orange-500/20 uppercase">Balanza Online</span>
            </div>

            <div class="p-6">
                <div id="modal-info-unidad" class="mb-6"></div>

                <div class="digital-display rounded-2xl border-2 border-orange-500/50 p-6 mb-6 relative group transition-all hover:border-orange-500">
                    <label class="absolute top-2 left-4 text-[10px] font-bold text-orange-500/60 uppercase tracking-widest">Peso Detectado</label>
                    <div class="flex items-center justify-center gap-3">
                        <input id="peso-input" type="number" 
                            class="input-huge w-full bg-transparent text-6xl text-center text-white font-mono font-black outline-none placeholder:text-zinc-800" 
                            placeholder="00000">
                        <span class="text-3xl font-black text-zinc-600 font-mono">KG</span>
                    </div>
                    <div class="w-full h-1 bg-zinc-800 mt-4 rounded-full overflow-hidden">
                        <div class="h-full bg-orange-500 w-1/3 animate-pulse"></div>
                    </div>
                </div>

                <div class="grid grid-cols-1 gap-3">
                    <button id="btn-confirmar-peso" class="w-full bg-orange-600 hover:bg-orange-500 text-white h-20 rounded-2xl font-black uppercase text-lg shadow-[0_4px_0_rgb(154,52,18)] active:translate-y-1 active:shadow-none transition-all flex items-center justify-center gap-3">
                        <span>Confirmar Registro</span>
                    </button>
                    
                    <button id="btn-modal-volver" onclick="cerrarModal()" class="w-full py-4 text-zinc-500 font-bold uppercase text-xs hover:text-white transition-colors tracking-widest">
                        ✕ Cancelar Operación
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, onSnapshot, query, where, updateDoc, doc, serverTimestamp, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD59XE1FYbUPqiUjn7vBMT89PcGjB2Svzs",
            authDomain: "ingresocamiones.firebaseapp.com",
            projectId: "ingresocamiones",
            storageBucket: "ingresocamiones.firebasestorage.app",
            messagingSenderId: "170806305489",
            appId: "1:170806305489:web:0264fc24aec12a19a31bf0"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        onAuthStateChanged(auth, async (user) => {
            if (!user || !user.email.toLowerCase().includes("recepc")) { 
                await signOut(auth); 
                window.location.href = "index.html"; 
            }
        });

        window.cerrarSesion = () => signOut(auth);

        const crearTarjeta = (id, data, esEntrada) => {
            const colorPrincipal = esEntrada ? 'orange-500' : 'blue-500';
            const bgBoton = esEntrada ? 'bg-orange-600 hover:bg-orange-500' : 'bg-blue-600 hover:bg-blue-500';

            return `
            <div class="bg-zinc-800 p-5 rounded-2xl border-l-8 border-${colorPrincipal} shadow-xl">
                <div class="flex justify-between items-start mb-4">
                    <div>
                        <p class="text-[10px] text-zinc-500 font-bold uppercase tracking-widest">Chofer</p>
                        <p class="text-lg font-bold text-white leading-tight">${data.chofer || 'S/N'}</p>
                        <p class="text-[10px] text-zinc-400 font-mono mt-0.5">DNI: ${data.dni || '-'}</p>
                        <p class="text-xs text-orange-400 font-mono font-bold mt-1 tracking-wider">📞 ${data.celular || 'Sin celular'}</p>
                    </div>
                    <div class="text-right">
                        <p class="text-[10px] text-zinc-500 font-bold uppercase tracking-widest">${data.tipoContenedor || 'CONTENEDOR'}</p>
                        <p class="text-3xl font-mono font-black text-orange-500 leading-none mt-1">${data.contenedor}</p>
                        <div class="mt-2 bg-blue-900/40 px-2 py-1 rounded border border-blue-500/30 text-right">
                            <p class="text-[8px] text-blue-300 font-black uppercase tracking-tighter">Est. Carga</p>
                            <p class="text-[11px] font-bold text-blue-200">${data.fechaEstimada || 'PENDIENTE'}</p>
                        </div>
                    </div>
                </div>
                <div class="grid grid-cols-2 gap-4 border-t border-zinc-700/50 pt-3 mb-3 text-xs">
                    <div>
                        <p class="text-[9px] text-zinc-500 font-bold uppercase italic">Patentes</p>
                        <p class="font-mono font-bold text-zinc-200 uppercase">${data.patenteCamion || '-'} / ${data.patenteSemi || '-'}</p>
                    </div>
                    <div class="text-right">
                        <p class="text-[9px] text-zinc-500 font-bold uppercase italic">País Destino</p>
                        <p class="font-bold text-blue-400 uppercase tracking-tighter italic">📍 ${data.destino || 'S/D'}</p>
                    </div>
                </div>
                <div class="bg-zinc-900/50 p-3 rounded-xl mb-4 flex justify-between items-center text-[11px]">
                    <div><span class="text-zinc-500 block font-bold uppercase text-[8px]">Barco / Viaje</span><span class="text-zinc-300 font-bold uppercase italic">${data.barcoViaje || 'N/C'}</span></div>
                    <div class="text-right"><span class="text-zinc-500 block font-bold uppercase text-[8px]">Cliente</span><span class="text-zinc-300 font-bold">${data.cliente}</span></div>
                </div>
                <button onclick="prepararPesaje('${id}', '${data.contenedor}', '${esEntrada ? 'ingreso' : 'salida'}')" 
                    class="w-full ${bgBoton} p-4 rounded-xl font-black text-sm uppercase transition-all shadow-md active:scale-95 text-center">
                    ${esEntrada ? 'Registrar Tara (Entrada)' : 'Registrar Bruto (Salida)'}
                </button>
            </div>`;
        };

        onSnapshot(query(collection(db, "camiones"), where("estado", "==", "Habilitado")), (snap) => {
            const cont = document.getElementById('lista-habilitados');
            cont.innerHTML = snap.empty ? '<p class="text-center py-10 text-zinc-600 italic">Esperando camiones autorizados por Logística...</p>' : "";
            snap.forEach(d => cont.innerHTML += crearTarjeta(d.id, d.data(), true));
        });

        onSnapshot(query(collection(db, "camiones"), where("estado", "==", "En Planta")), (snap) => {
            const cont = document.getElementById('lista-en-planta');
            cont.innerHTML = snap.empty ? '<p class="text-center py-10 text-zinc-600 italic">No hay camiones dentro del predio.</p>' : "";
            snap.forEach(d => cont.innerHTML += crearTarjeta(d.id, d.data(), false));
        });

        let currentId = null; let modoAccion = "";
        window.prepararPesaje = async (id, contenedor, modo) => {
            currentId = id; modoAccion = modo;
            const snap = await getDoc(doc(db, "camiones", id));
            const d = snap.data();
            
            const btn = document.getElementById('btn-confirmar-peso');
            btn.disabled = false;
            btn.innerHTML = "<span>Confirmar Registro</span>";
            btn.className = "w-full bg-orange-600 hover:bg-orange-500 text-white h-20 rounded-2xl font-black uppercase text-lg shadow-[0_4px_0_rgb(154,52,18)] active:translate-y-1 active:shadow-none transition-all flex items-center justify-center gap-3";
            document.getElementById('btn-modal-volver').style.display = "block";

            document.getElementById('modal-titulo').innerText = modo === 'ingreso' ? "CONTROL DE TARA" : "CONTROL DE BRUTO";
            document.getElementById('modal-info-unidad').innerHTML = `
                <div class="bg-black/40 p-4 rounded-2xl border border-zinc-800">
                    <p class="text-[10px] text-zinc-500 font-bold uppercase tracking-widest mb-1 text-center">Identificación de Unidad</p>
                    <p class="text-4xl font-mono font-black text-white leading-none text-center">${d.contenedor}</p>
                    <div class="flex justify-between mt-4 text-[11px] border-t border-zinc-800 pt-3">
                        <span class="text-zinc-400">CHOFER: <b class="text-zinc-200">${d.chofer || '---'}</b></span>
                        <span class="text-zinc-400">PATENTE: <b class="text-zinc-200">${d.patenteCamion || '---'}</b></span>
                    </div>
                </div>`;
            
            document.getElementById('peso-input').value = "";
            document.getElementById('modal-pesaje').classList.remove('hidden');
            setTimeout(() => document.getElementById('peso-input').focus(), 300);
        };

        window.cerrarModal = () => document.getElementById('modal-pesaje').classList.add('hidden');

        document.getElementById('btn-confirmar-peso').onclick = async () => {
            const peso = parseFloat(document.getElementById('peso-input').value);
            if (!peso || peso <= 0) return alert("⚠️ Ingrese un peso válido detectado por la balanza.");
            
            const btn = document.getElementById('btn-confirmar-peso');
            const btnVolver = document.getElementById('btn-modal-volver');
            
            let estadoValidacion = "OK"; // Por defecto asumimos que el peso está en rango

            // --- LÓGICA DE VALIDACIÓN DE PESO ---
            if (modoAccion === "salida") {
                try {
                    const snap = await getDoc(doc(db, "camiones", currentId));
                    if (snap.exists()) {
                        const data = snap.data();
                        const taraGuardada = data.tara || 0;
                        const pesoTeorico = data.pesoTeoricoTotal || 0;
                        const netoReal = peso - taraGuardada;

                        if (pesoTeorico > 0) {
                            const diferencia = Math.abs(netoReal - pesoTeorico);
                            if (diferencia > 180) {
                                const confirmar = confirm(
                                    `⚠️ ALERTA DE DIFERENCIA\n\n` +
                                    `Neto Teórico: ${pesoTeorico} kg\n` +
                                    `Neto Balanza: ${netoReal} kg\n` +
                                    `Diferencia: ${diferencia.toFixed(2)} kg\n\n` +
                                    `La diferencia supera los 180kg. ¿Desea continuar de todos modos?`
                                );
                                if (!confirmar) return; // Cancela el guardado
                                estadoValidacion = "ALERTA"; // Usuario aceptó la diferencia
                            }
                        }
                    }
                } catch (err) {
                    console.error("Error validando pesos:", err);
                }
            }

            // --- INTERFAZ DE PROCESANDO ---
            btn.disabled = true;
            btnVolver.style.display = "none";
            btn.innerHTML = `
                <svg class="animate-spin h-6 w-6 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
                <span class="animate-pulse-fast">ENVIANDO DATOS...</span>
            `;
            btn.className = "w-full bg-zinc-800 text-zinc-500 h-20 rounded-2xl font-black uppercase text-lg flex items-center justify-center gap-3 cursor-not-allowed border border-zinc-700";

            // --- GUARDADO EN FIREBASE ---
            const docRef = doc(db, "camiones", currentId);
            try {
                if (modoAccion === "ingreso") { 
                    await updateDoc(docRef, { 
                        tara: peso, 
                        estado: "En Planta", 
                        fechaIngreso: serverTimestamp() 
                    }); 
                } else { 
                    await updateDoc(docRef, { 
                        bruto: peso, 
                        estado: "Finalizado", 
                        fechaSalida: serverTimestamp(),
                        validacionPeso: estadoValidacion // <--- Esto le avisa a Logística
                    }); 
                }
                cerrarModal();
            } catch (error) { 
                alert("Error al guardar: " + error.message);
                btn.disabled = false;
                btn.innerHTML = "<span>Confirmar Registro</span>";
                btn.className = "w-full bg-orange-600 hover:bg-orange-500 text-white h-20 rounded-2xl font-black uppercase text-lg shadow-[0_4px_0_rgb(154,52,18)] active:translate-y-1 active:shadow-none transition-all flex items-center justify-center gap-3";
                btnVolver.style.display = "block";
            }
        };
        
        window.cambiarTab = (tabId) => {
            document.getElementById('tab-entrada').classList.toggle('hidden', tabId !== 'tab-entrada');
            document.getElementById('tab-salida').classList.toggle('hidden', tabId !== 'tab-salida');
            document.getElementById('btn-tab-entrada').className = `flex-1 p-4 rounded-xl font-black text-sm transition-all ${tabId === 'tab-entrada' ? 'bg-orange-600 text-white shadow-lg' : 'bg-zinc-800 text-gray-500'}`;
            document.getElementById('btn-tab-salida').className = `flex-1 p-4 rounded-xl font-black text-sm transition-all ${tabId === 'tab-salida' ? 'bg-blue-700 text-white shadow-lg' : 'bg-zinc-800 text-gray-500'}`;
        };
    </script>
</body>
</html>
