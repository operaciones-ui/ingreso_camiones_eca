<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portería: Control Detallado - ECA</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-zinc-900 text-white p-4 font-sans">
    <div class="max-w-4xl mx-auto">
        <div class="flex justify-between items-center mb-6 border-b border-green-900 pb-4">
            <div>
                <h1 class="text-2xl font-bold text-green-400">Portería: Pesaje y Acceso</h1>
                <p class="text-[10px] text-zinc-500 uppercase tracking-widest font-bold">Control de Unidades en Planta</p>
            </div>
            <button onclick="cerrarSesion()" class="text-xs bg-zinc-800 text-gray-400 px-3 py-2 rounded-lg hover:bg-zinc-700 transition">Cerrar Sesión</button>
        </div>

        <div class="flex gap-2 mb-6">
            <button onclick="cambiarTab('tab-entrada')" id="btn-tab-entrada" class="flex-1 p-4 rounded-xl font-black text-sm bg-green-700 text-white shadow-lg transition-all">PARA INGRESAR</button>
            <button onclick="cambiarTab('tab-salida')" id="btn-tab-salida" class="flex-1 p-4 rounded-xl font-black text-sm bg-zinc-800 text-gray-500 transition-all">EN PLANTA / SALIDA</button>
        </div>

        <div id="tab-entrada" class="space-y-4">
            <h2 class="text-[10px] font-bold text-zinc-500 uppercase px-2">Unidades Habilitadas por Logística</h2>
            <div id="lista-habilitados" class="space-y-4">
                </div>
        </div>

        <div id="tab-salida" class="hidden space-y-4">
            <h2 class="text-[10px] font-bold text-zinc-500 uppercase px-2">Unidades dentro del Predio</h2>
            <div id="lista-en-planta" class="space-y-4">
                </div>
        </div>
    </div>

    <div id="modal-pesaje" class="hidden fixed inset-0 bg-black/90 backdrop-blur-md flex items-center justify-center p-4 z-50">
        <div class="bg-zinc-800 p-6 rounded-2xl border border-zinc-700 w-full max-w-md shadow-2xl">
            <h3 id="modal-titulo" class="font-black text-2xl mb-2 text-green-400 uppercase italic">Registrar Tara</h3>
            <div id="modal-info-unidad" class="bg-zinc-900 p-4 rounded-xl mb-6 border border-zinc-700">
                </div>
            
            <label class="block text-center text-xs font-bold text-zinc-500 uppercase mb-2 text-green-400">Ingrese el Peso en KG</label>
            <input id="peso-input" type="number" step="0.01" class="w-full bg-black border-2 border-zinc-700 p-6 rounded-xl text-4xl text-center mb-6 text-white font-mono focus:border-green-500 outline-none" placeholder="0.00">
            
            <div class="flex gap-3">
                <button id="btn-confirmar-peso" class="flex-1 bg-green-600 p-4 rounded-xl font-black hover:bg-green-500 shadow-lg shadow-green-900/20 transition-all">CONFIRMAR</button>
                <button onclick="cerrarModal()" class="flex-1 bg-zinc-700 p-4 rounded-xl font-black text-zinc-400">CANCELAR</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, onSnapshot, query, where, updateDoc, doc, serverTimestamp, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD59XE1FYbUPqiUjn7vBMT89PcGjB2Svzs",
            authDomain: "ingresocamiones.firebaseapp.com",
            projectId: "ingresocamiones",
            storageBucket: "ingresocamiones.firebasestorage.app",
            messagingSenderId: "170806305489",
            appId: "1:170806305489:web:0264fc24aec12a19a31bf0"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        onAuthStateChanged(auth, async (user) => {
            if (!user || !user.email.toLowerCase().includes("recepc")) {
                await signOut(auth); window.location.href = "index.html";
            }
        });

        window.cerrarSesion = () => signOut(auth);

        // --- RENDERIZADO DE TARJETAS CON INFO COMPLETA ---
        const crearTarjeta = (id, data, esEntrada) => {
            return `
            <div class="bg-zinc-800 p-5 rounded-2xl border-l-8 ${esEntrada ? 'border-green-600' : 'border-blue-600'} shadow-xl">
                <div class="grid grid-cols-2 gap-2 mb-4">
                    <div>
                        <p class="text-[10px] text-zinc-500 font-bold uppercase">Unidad / Semi</p>
                        <p class="text-xl font-mono font-black text-white">${data.patente} <span class="text-zinc-500">/ ${data.patenteSemi || '-'}</span></p>
                    </div>
                    <div class="text-right">
                        <p class="text-[10px] text-zinc-500 font-bold uppercase">Contenedor</p>
                        <p class="text-sm font-mono font-bold text-orange-400">${data.contenedor || 'S/N'}</p>
                    </div>
                </div>
                <div class="grid grid-cols-2 gap-4 text-xs border-t border-zinc-700 pt-4 mb-4">
                    <div>
                        <p class="text-zinc-500 font-bold uppercase text-[9px]">Transporte</p>
                        <p class="text-zinc-300">${data.transporte}</p>
                        <p class="text-zinc-500 italic mt-1">${data.chofer}</p>
                    </div>
                    <div>
                        <p class="text-zinc-500 font-bold uppercase text-[9px]">Cliente / Referencia</p>
                        <p class="text-zinc-300 font-bold">${data.cliente}</p>
                        <p class="text-blue-400 font-mono text-[10px]">${data.referencia || '-'}</p>
                    </div>
                </div>
                <button onclick="${esEntrada ? 'prepararPesaje' : 'prepararPesaje'}('${id}', '${data.patente}', '${esEntrada ? 'ingreso' : 'salida'}')" 
                    class="w-full ${esEntrada ? 'bg-green-600 hover:bg-green-500' : 'bg-blue-600 hover:bg-blue-500'} p-3 rounded-xl font-black text-sm transition-all uppercase">
                    ${esEntrada ? 'Registrar Entrada (Tara)' : 'Registrar Salida (Bruto)'}
                </button>
            </div>`;
        };

        onSnapshot(query(collection(db, "camiones"), where("estado", "==", "Habilitado")), (snap) => {
            const cont = document.getElementById('lista-habilitados');
            cont.innerHTML = snap.empty ? '<p class="text-center py-10 text-zinc-600 italic">No hay camiones habilitados.</p>' : "";
            snap.forEach(d => cont.innerHTML += crearTarjeta(d.id, d.data(), true));
        });

        onSnapshot(query(collection(db, "camiones"), where("estado", "==", "En Planta")), (snap) => {
            const cont = document.getElementById('lista-en-planta');
            cont.innerHTML = snap.empty ? '<p class="text-center py-10 text-zinc-600 italic">No hay unidades en planta.</p>' : "";
            snap.forEach(d => cont.innerHTML += crearTarjeta(d.id, d.data(), false));
        });

        // --- LÓGICA DE MODAL ---
        let currentId = null;
        let modoAccion = "";

        window.prepararPesaje = async (id, patente, modo) => {
            currentId = id;
            modoAccion = modo;
            const snap = await getDoc(doc(db, "camiones", id));
            const d = snap.data();

            document.getElementById('modal-titulo').innerText = modo === 'ingreso' ? "Registro de TARA" : "Registro de BRUTO";
            document.getElementById('modal-info-unidad').innerHTML = `
                <p class="text-center text-xl font-mono font-bold text-white mb-1">${d.patente}</p>
                <p class="text-center text-[10px] text-zinc-500 uppercase">${d.transporte} | ${d.contenedor || 'S/N'}</p>
                ${modo === 'salida' ? `<p class="text-center text-green-500 font-bold mt-2">Tara: ${d.tara} Kg</p>` : ''}
            `;
            document.getElementById('peso-input').value = "";
            document.getElementById('modal-pesaje').classList.remove('hidden');
        };

        window.cerrarModal = () => document.getElementById('modal-pesaje').classList.add('hidden');

        document.getElementById('btn-confirmar-peso').onclick = async () => {
            const peso = parseFloat(document.getElementById('peso-input').value);
            if (!peso || peso <= 0) return alert("Ingrese un peso válido");

            const docRef = doc(db, "camiones", currentId);
            if (modoAccion === "ingreso") {
                await updateDoc(docRef, { tara: peso, estado: "En Planta", fechaIngreso: serverTimestamp() });
            } else {
                await updateDoc(docRef, { bruto: peso, estado: "Finalizado", fechaSalida: serverTimestamp() });
            }
            cerrarModal();
        };

        window.cambiarTab = (tabId) => {
            document.getElementById('tab-entrada').classList.toggle('hidden', tabId !== 'tab-entrada');
            document.getElementById('tab-salida').classList.toggle('hidden', tabId !== 'tab-salida');
            document.getElementById('btn-tab-entrada').className = `flex-1 p-4 rounded-xl font-black text-sm transition-all ${tabId === 'tab-entrada' ? 'bg-green-700 text-white shadow-lg' : 'bg-zinc-800 text-gray-500'}`;
            document.getElementById('btn-tab-salida').className = `flex-1 p-4 rounded-xl font-black text-sm transition-all ${tabId === 'tab-salida' ? 'bg-blue-700 text-white shadow-lg' : 'bg-zinc-800 text-gray-500'}`;
        };
    </script>
</body>
</html>
