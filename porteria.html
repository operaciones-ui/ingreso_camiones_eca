<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portería: Control de Acceso - ECA</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 p-4 font-sans text-gray-800">

    <div class="max-w-7xl mx-auto">
        <div class="flex justify-between items-center mb-6 bg-white p-4 rounded-lg shadow-sm border-l-8 border-blue-600">
            <div class="flex items-center gap-4">
                <img src="https://raw.githubusercontent.com/operaciones-ui/ingreso_camiones_eca/main/logo.png" 
                     alt="Logo" class="h-12 w-auto rounded" onerror="this.src='https://via.placeholder.com/150?text=ECA'">
                <div>
                    <h1 class="text-2xl font-bold text-gray-800">ECA Portería</h1>
                    <p class="text-xs text-blue-600 font-bold uppercase tracking-widest">Control de Ingreso y Salida</p>
                </div>
            </div>
            <button onclick="cerrarSesion()" class="bg-gray-100 text-gray-500 px-4 py-2 rounded-lg font-bold text-xs hover:bg-red-500 hover:text-white transition-all">Cerrar Sesión</button>
        </div>

        <div class="bg-white rounded-xl shadow-md overflow-hidden border border-gray-100">
            <table class="w-full text-left text-xs">
                <thead>
                    <tr class="bg-gray-50 text-gray-400 border-b font-bold uppercase text-[10px]">
                        <th class="p-4">Cliente / Exportador</th>
                        <th class="p-4">Contenedor</th>
                        <th class="p-4">Chofer / DNI</th>
                        <th class="p-4">Patentes</th>
                        <th class="p-4 text-center">Estado</th>
                        <th class="p-4 text-right">Acciones de Tiempo</th>
                    </tr>
                </thead>
                <tbody id="tabla-porteria" class="divide-y divide-gray-100">
                    </tbody>
            </table>
        </div>
    </div>

    <div id="modal-porteria" class="hidden fixed inset-0 bg-slate-900/90 backdrop-blur-sm flex items-center justify-center p-4 z-50">
        <div class="bg-white p-6 rounded-2xl shadow-2xl w-full max-w-lg">
            <h3 class="font-black text-lg mb-4 uppercase border-b pb-2">Corregir Datos de Ingreso</h3>
            <input id="edit-id" type="hidden">
            <div class="grid grid-cols-2 gap-4 mb-6">
                <div class="col-span-2">
                    <label class="block text-[10px] font-bold text-gray-400 uppercase mb-1">Nombre Chofer</label>
                    <input id="edit-chofer" type="text" class="w-full border p-2 rounded text-sm">
                </div>
                <div>
                    <label class="block text-[10px] font-bold text-gray-400 uppercase mb-1">DNI</label>
                    <input id="edit-dni" type="text" class="w-full border p-2 rounded text-sm">
                </div>
                <div>
                    <label class="block text-[10px] font-bold text-gray-400 uppercase mb-1">Patente Camión</label>
                    <input id="edit-patenteCamion" type="text" class="w-full border p-2 rounded text-sm uppercase font-mono">
                </div>
                <div class="col-span-2">
                    <label class="block text-[10px] font-bold text-gray-400 uppercase mb-1">Patente Semi</label>
                    <input id="edit-patenteSemi" type="text" class="w-full border p-2 rounded text-sm uppercase font-mono">
                </div>
            </div>
            <div class="flex gap-2">
                <button onclick="guardarCambiosPorteria()" class="flex-1 bg-blue-600 text-white p-3 rounded-xl font-bold uppercase text-xs">Guardar</button>
                <button onclick="cerrarModal()" class="flex-1 bg-gray-100 text-gray-400 p-3 rounded-xl font-bold uppercase text-xs">Cancelar</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, onSnapshot, query, updateDoc, doc, getDoc, orderBy, serverTimestamp, where } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD59XE1FYbUPqiUjn7vBMT89PcGjB2Svzs",
            authDomain: "ingresocamiones.firebaseapp.com",
            projectId: "ingresocamiones",
            storageBucket: "ingresocamiones.firebasestorage.app",
            messagingSenderId: "170806305489",
            appId: "1:170806305489:web:0264fc24aec12a19a31bf0"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        const colRef = collection(db, "camiones");

        onAuthStateChanged(auth, (user) => { if (!user) window.location.href = "index.html"; });
        window.cerrarSesion = () => signOut(auth);

        onSnapshot(query(colRef, orderBy("fecha", "desc")), (snapshot) => {
            const tbody = document.getElementById('tabla-porteria');
            tbody.innerHTML = "";

            snapshot.forEach(d => {
                const data = { id: d.id, ...d.data() };
                
                // Solo mostrar camiones que NO estén finalizados
                if (data.estado !== "Finalizado") {
                    
                    const estaEnPlanta = data.estado === "En Planta";
                    const esHabilitado = data.estado === "Habilitado";
                    const esPendiente = data.estado === "Pendiente";

                    // Colores de estado
                    const colorEstado = esPendiente ? "bg-red-100 text-red-600" : (estaEnPlanta ? "bg-green-100 text-green-700" : "bg-blue-100 text-blue-700");

                    tbody.innerHTML += `
                        <tr class="hover:bg-blue-50/30 border-b border-gray-50">
                            <td class="p-4 font-bold text-gray-700">${data.cliente}<p class="text-[9px] text-gray-400">REF: ${data.referencia || '-'}</p></td>
                            <td class="p-4 font-mono font-black text-blue-600 text-sm">${data.contenedor}</td>
                            <td class="p-4">
                                <b class="block">${data.chofer}</b>
                                <span class="text-[10px] bg-gray-100 px-1 rounded text-gray-500 font-mono">DNI: ${data.dni || '-'}</span>
                            </td>
                            <td class="p-4 font-mono text-[10px] text-gray-500 uppercase">
                                C: ${data.patenteCamion || '-'}<br>S: ${data.patenteSemi || '-'}
                            </td>
                            <td class="p-4 text-center">
                                <span class="px-2 py-1 rounded text-[9px] font-bold ${colorEstado}">${data.estado}</span>
                            </td>
                            <td class="p-4 text-right">
                                <div class="flex flex-col gap-1 items-end">
                                    ${esHabilitado ? `
                                        <button onclick="registrarIngreso('${d.id}')" class="bg-blue-600 text-white px-3 py-1.5 rounded font-black text-[10px] uppercase shadow-md hover:bg-blue-700 w-32">Registrar IN</button>
                                    ` : ''}
                                    ${estaEnPlanta ? `
                                        <button onclick="registrarSalida('${d.id}')" class="bg-red-600 text-white px-3 py-1.5 rounded font-black text-[10px] uppercase shadow-md hover:bg-red-700 w-32">Registrar OUT</button>
                                    ` : ''}
                                    ${esPendiente ? `
                                        <span class="text-[9px] font-black text-red-400 italic">ESPERANDO LOGÍSTICA...</span>
                                    ` : ''}
                                    <button onclick="abrirModalPorteria('${d.id}')" class="text-blue-400 text-[9px] font-bold uppercase mt-1">Editar Datos</button>
                                </div>
                            </td>
                        </tr>`;
                }
            });
        });

        window.registrarIngreso = (id) => {
            updateDoc(doc(db, "camiones", id), {
                estado: "En Planta",
                fechaIngreso: serverTimestamp()
            });
        };

        window.registrarSalida = (id) => {
            if(confirm("¿Confirmar salida del contenedor? El registro pasará al historial.")){
                updateDoc(doc(db, "camiones", id), {
                    estado: "Finalizado",
                    fechaSalida: serverTimestamp()
                });
            }
        };

        window.abrirModalPorteria = async (id) => {
            const snap = await getDoc(doc(db, "camiones", id));
            const d = snap.data();
            document.getElementById('edit-id').value = id;
            document.getElementById('edit-chofer').value = d.chofer || '';
            document.getElementById('edit-dni').value = d.dni || '';
            document.getElementById('edit-patenteCamion').value = d.patenteCamion || '';
            document.getElementById('edit-patenteSemi').value = d.patenteSemi || '';
            document.getElementById('modal-porteria').classList.remove('hidden');
        };

        window.cerrarModal = () => document.getElementById('modal-porteria').classList.add('hidden');

        window.guardarCambiosPorteria = async () => {
            const id = document.getElementById('edit-id').value;
            await updateDoc(doc(db, "camiones", id), {
                chofer: document.getElementById('edit-chofer').value,
                dni: document.getElementById('edit-dni').value,
                patenteCamion: document.getElementById('edit-patenteCamion').value.toUpperCase(),
                patenteSemi: document.getElementById('edit-patenteSemi').value.toUpperCase()
            });
            cerrarModal();
        };

    </script>
</body>
</html>
