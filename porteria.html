<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Módulo Portería - Control de Pesaje</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-zinc-900 text-white p-4">
    <div class="max-w-3xl mx-auto">
        <div class="flex justify-between items-center mb-6 border-b border-green-900 pb-2">
            <h1 class="text-2xl font-bold text-green-400">Portería: Pesaje y Acceso</h1>
            <button onclick="cerrarSesion()" class="text-xs bg-zinc-700 text-gray-300 px-2 py-1 rounded">Cerrar Sesión</button>
        </div>

        <div class="flex gap-2 mb-6">
            <button onclick="cambiarTab('tab-entrada')" id="btn-tab-entrada" class="flex-1 p-3 rounded-t font-bold bg-green-700 text-white">PARA INGRESAR</button>
            <button onclick="cambiarTab('tab-salida')" id="btn-tab-salida" class="flex-1 p-3 rounded-t font-bold bg-zinc-800 text-gray-400">EN PLANTA / SALIDA</button>
        </div>

        <div id="tab-entrada" class="space-y-4">
            <h2 class="text-sm font-bold text-gray-400 uppercase tracking-widest">Esperando en puerta</h2>
            <div id="lista-habilitados" class="space-y-3"></div>
        </div>

        <div id="tab-salida" class="hidden space-y-4">
            <h2 class="text-sm font-bold text-gray-400 uppercase tracking-widest">Unidades dentro del predio</h2>
            <div id="lista-en-planta" class="space-y-3"></div>
        </div>
    </div>

    <div id="modal-pesaje" class="hidden fixed inset-0 bg-black bg-opacity-80 flex items-center justify-center p-4">
        <div class="bg-zinc-800 p-6 rounded-lg border border-zinc-600 w-full max-w-sm">
            <h3 id="modal-titulo" class="font-bold text-xl mb-2 text-green-400">Registrar Peso</h3>
            <p id="modal-detalle" class="text-sm text-gray-400 mb-4 font-mono"></p>
            
            <input id="peso-input" type="number" step="0.01" class="w-full bg-zinc-900 border border-zinc-700 p-4 rounded text-2xl text-center mb-4 text-white outline-none focus:border-green-500" placeholder="0.00 kg">
            
            <div class="flex gap-2">
                <button id="btn-confirmar-peso" class="flex-1 bg-green-600 p-3 rounded font-bold hover:bg-green-500">CONFIRMAR</button>
                <button onclick="cerrarModal()" class="flex-1 bg-zinc-700 p-3 rounded">CANCELAR</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, onSnapshot, query, where, updateDoc, doc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD59XE1FYbUPqiUjn7vBMT89PcGjB2Svzs",
            authDomain: "ingresocamiones.firebaseapp.com",
            projectId: "ingresocamiones",
            storageBucket: "ingresocamiones.firebasestorage.app",
            messagingSenderId: "170806305489",
            appId: "1:170806305489:web:0264fc24aec12a19a31bf0"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        // SEGURIDAD
        onAuthStateChanged(auth, async (user) => {
            if (!user || !user.email.toLowerCase().includes("recepc")) {
                await signOut(auth);
                window.location.href = "index.html";
            }
        });

        window.cerrarSesion = () => signOut(auth);

        // --- LISTENER: HABILITADOS (ENTRADA) ---
        onSnapshot(query(collection(db, "camiones"), where("estado", "==", "Habilitado")), (snapshot) => {
            const container = document.getElementById('lista-habilitados');
            container.innerHTML = snapshot.empty ? '<p class="text-zinc-600 text-center py-10 italic">No hay camiones autorizados para entrar.</p>' : "";
            snapshot.forEach(d => {
                const data = d.data();
                container.innerHTML += `
                    <div class="bg-zinc-800 p-4 rounded-lg flex justify-between items-center border-l-4 border-green-600 shadow-lg">
                        <div><p class="text-xl font-mono text-green-400 font-bold">${data.patente}</p><p class="text-gray-400 text-xs uppercase">${data.chofer}</p></div>
                        <button onclick="prepararIngreso('${d.id}', '${data.patente}')" class="bg-green-600 hover:bg-green-500 px-4 py-2 rounded font-bold">ENTRADA (TARA)</button>
                    </div>`;
            });
        });

        // --- LISTENER: EN PLANTA (SALIDA) ---
        onSnapshot(query(collection(db, "camiones"), where("estado", "==", "En Planta")), (snapshot) => {
            const container = document.getElementById('lista-en-planta');
            container.innerHTML = snapshot.empty ? '<p class="text-zinc-600 text-center py-10 italic">No hay camiones en planta.</p>' : "";
            snapshot.forEach(d => {
                const data = d.data();
                container.innerHTML += `
                    <div class="bg-zinc-800 p-4 rounded-lg flex justify-between items-center border-l-4 border-blue-600 shadow-lg">
                        <div>
                            <p class="text-xl font-mono text-blue-400 font-bold">${data.patente}</p>
                            <p class="text-xs text-gray-500 uppercase">Tara registrada: ${data.tara || 0} kg</p>
                        </div>
                        <button onclick="prepararSalida('${d.id}', '${data.patente}')" class="bg-blue-600 hover:bg-blue-500 px-4 py-2 rounded font-bold">SALIDA (BRUTO)</button>
                    </div>`;
            });
        });

        // --- LÓGICA DE MODAL Y PESOS ---
        let currentId = null;
        let modoAccion = ""; // "ingreso" o "salida"

        window.prepararIngreso = (id, patente) => {
            currentId = id;
            modoAccion = "ingreso";
            document.getElementById('modal-titulo').innerText = "Registro de TARA";
            document.getElementById('modal-detalle').innerText = "Camión: " + patente;
            document.getElementById('peso-input').value = "";
            document.getElementById('modal-pesaje').classList.remove('hidden');
        };

        window.prepararSalida = (id, patente) => {
            currentId = id;
            modoAccion = "salida";
            document.getElementById('modal-titulo').innerText = "Registro de BRUTO";
            document.getElementById('modal-detalle').innerText = "Camión: " + patente;
            document.getElementById('peso-input').value = "";
            document.getElementById('modal-pesaje').classList.remove('hidden');
        };

        window.cerrarModal = () => document.getElementById('modal-pesaje').classList.add('hidden');

        document.getElementById('btn-confirmar-peso').onclick = async () => {
            const peso = document.getElementById('peso-input').value;
            if (!peso || peso <= 0) return alert("Ingrese un peso válido");

            const docRef = doc(db, "camiones", currentId);
            
            if (modoAccion === "ingreso") {
                await updateDoc(docRef, { 
                    tara: peso, 
                    estado: "En Planta", 
                    fechaIngreso: serverTimestamp() 
                });
            } else {
                await updateDoc(docRef, { 
                    bruto: peso, 
                    estado: "Finalizado", 
                    fechaSalida: serverTimestamp() 
                });
            }
            cerrarModal();
        };

        // --- NAVEGACIÓN ---
        window.cambiarTab = (tabId) => {
            document.getElementById('tab-entrada').classList.add('hidden');
            document.getElementById('tab-salida').classList.add('hidden');
            document.getElementById(tabId).classList.remove('hidden');
            
            // Estilos de botones
            document.getElementById('btn-tab-entrada').className = "flex-1 p-3 rounded-t font-bold " + (tabId === 'tab-entrada' ? 'bg-green-700 text-white' : 'bg-zinc-800 text-gray-400');
            document.getElementById('btn-tab-salida').className = "flex-1 p-3 rounded-t font-bold " + (tabId === 'tab-salida' ? 'bg-blue-700 text-white' : 'bg-zinc-800 text-gray-400');
        };
    </script>
</body>
</html>
