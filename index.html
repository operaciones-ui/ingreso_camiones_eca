<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Control de Acceso</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-200 flex items-center justify-center h-screen">

    <div class="bg-white p-8 rounded-xl shadow-lg w-full max-w-md">
        <h1 class="text-2xl font-bold text-center mb-6 text-gray-800">Ingreso al Sistema</h1>
        
        <div class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-700">Correo Electrónico</label>
                <input type="email" id="email" class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700">Contraseña</label>
                <input type="password" id="password" class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
            </div>
            <button onclick="login()" id="btnLogin" class="w-full bg-blue-600 text-white p-3 rounded-lg font-bold hover:bg-blue-700 transition">
                Entrar
            </button>
            <p id="error-msg" class="text-red-500 text-sm text-center hidden font-medium"></p>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = {
            // REEMPLAZA CON TUS DATOS
            const firebaseConfig = {
            apiKey: "AIzaSyD59XE1FYbUPqiUjn7vBMT89PcGjB2Svzs",
            authDomain: "ingresocamiones.firebaseapp.com",
            projectId: "ingresocamiones",
            storageBucket: "ingresocamiones.firebasestorage.app",
            messagingSenderId: "170806305489",
            appId: "1:170806305489:web:0264fc24aec12a19a31bf0"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        window.login = async () => {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('password').value;
            const errorMsg = document.getElementById('error-msg');
            const btn = document.getElementById('btnLogin');

            btn.innerText = "Verificando...";
            errorMsg.classList.add('hidden');

            try {
                const userCredential = await signInWithEmailAndPassword(auth, email, pass);
                const user = userCredential.user;

                // LÓGICA DE REDIRECCIÓN POR EMAIL
                if (user.email.includes("recepcion")) {
                    window.location.href = "https://operaciones-ui.github.io/ingreso_camiones_eca/porteria.html";
                } else if (user.email.includes("operaciones")) {
                    window.location.href = "https://operaciones-ui.github.io/ingreso_camiones_eca/logistica.html";
                } else {
                    alert("Usuario no reconocido para ningún módulo");
                }

            } catch (error) {
                errorMsg.innerText = "Error: Credenciales incorrectas";
                errorMsg.classList.remove('hidden');
                btn.innerText = "Entrar";
            }
        };
    </script>
</body>
</html>
